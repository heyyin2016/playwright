<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>混乱魔法市场</title>
    <link rel="stylesheet" href="../shared/game-portal.css">
    <style>
        :root {
            --bg-dark: #12122a;
            --market-green: #4CAF50;
            --market-red: #F44336;
            --accent-yellow: #FFC107;
            --text-light: #E0E0E0;
            --card-bg: #1e1e4a;
            --button-primary: #03A9F4;
            --button-secondary: #FF9800;
            --theme-purple: #9c27b0;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(156, 39, 176, 0.5);
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--accent-yellow);
            text-shadow: 0 0 10px var(--accent-yellow);
            margin-bottom: 10px;
        }

        /* 音频按钮样式 */
        .audio-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            opacity: 0.9;
            z-index: 100;
        }

        .audio-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
            opacity: 1;
        }

        .audio-btn:active {
            transform: scale(0.95);
        }

        .sound-icon {
            width: 24px;
            height: 24px;
            fill: white;
            transition: all 0.3s ease;
        }

        .sound-waves {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .audio-btn.playing .sound-waves {
            opacity: 1;
        }

        .sound-wave {
            width: 3px;
            height: 8px;
            background: white;
            border-radius: 2px;
            animation: soundWave 0.5s ease-in-out infinite;
        }

        .sound-wave:nth-child(1) {
            animation-delay: 0s;
        }

        .sound-wave:nth-child(2) {
            animation-delay: 0.1s;
            height: 12px;
        }

        .sound-wave:nth-child(3) {
            animation-delay: 0.2s;
            height: 16px;
        }

        @keyframes soundWave {

            0%,
            100% {
                transform: scaleY(1);
            }

            50% {
                transform: scaleY(0.5);
            }
        }

        .audio-btn.playing .sound-icon {
            animation: speakerPulse 1s ease-in-out infinite;
        }

        @keyframes speakerPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .portal-game-status {
            border: 1px solid rgba(255, 193, 7, 0.42);
            background: rgba(33, 25, 66, 0.92);
            color: #fff5c4;
            box-shadow: 0 0 24px rgba(156, 39, 176, 0.22);
        }

        .portal-home-link {
            color: var(--accent-yellow);
            text-shadow: 0 0 8px rgba(255, 193, 7, 0.28);
        }

        /* 准备页面样式 - 全屏独立页面 */
        #prepare-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-dark);
            z-index: 999;
            padding: 0;
            margin: 0;
            align-items: center;
            justify-content: center;
        }

        #prepare-screen.show {
            display: flex;
        }

        .prepare-content {
            background: linear-gradient(135deg, var(--theme-purple), var(--button-primary));
            padding: 60px 50px;
            border-radius: 30px;
            margin: 0;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 0 50px rgba(156, 39, 176, 0.8);
            animation: prepareAppear 0.5s ease-out;
            text-align: center;
            position: relative;
        }

        @keyframes prepareAppear {
            from {
                opacity: 1;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .prepare-content h2 {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .prepare-content p {
            font-size: 1.4em;
            line-height: 1.8;
            color: white;
            margin-bottom: 20px;
        }

        .prepare-content p strong {
            color: var(--accent-yellow);
            font-size: 1.2em;
            text-shadow: 0 0 10px var(--accent-yellow);
        }

        .ready-btn {
            padding: 20px 50px;
            font-size: 1.5em;
            background: var(--market-green);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.5);
            margin-top: 20px;
        }

        .ready-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.7);
        }

        .ready-btn:active {
            transform: scale(0.98);
        }

        /* 游戏界面 */
        #game-area {
            display: none;
            padding: 20px;
        }

        /* 市场显示区 */
        .market-display {
            border: 2px solid var(--button-primary);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            background: #2a2a6a;
        }

        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        #material-name {
            font-size: 1.8em;
            color: var(--button-primary);
        }

        #current-price {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
            transition: color 0.3s, transform 0.2s;
        }

        #timer {
            font-size: 1em;
            color: var(--market-red);
            font-weight: bold;
            background: rgba(244, 67, 54, 0.2);
            padding: 10px 10px;
            border-radius: 15px;
            border: 3px solid var(--market-red);
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.6);
            animation: timerPulse 1s ease-in-out infinite;
            min-width: 100px;
            display: inline-block;
        }

        @keyframes timerPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(244, 67, 54, 0.6);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 30px rgba(244, 67, 54, 0.9);
            }
        }

        #timer.warning {
            animation: timerWarning 0.5s ease-in-out infinite;
            background: rgba(244, 67, 54, 0.4);
            border-color: #ff0000;
        }

        @keyframes timerWarning {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 50px rgba(255, 0, 0, 1);
            }
        }

        /* 决策按钮 */
        .decision-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .decision-buttons button {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-family: inherit;
            font-weight: bold;
            min-width: 150px;
        }

        .btn-buy {
            background-color: var(--market-green);
            color: white;
        }

        .btn-wait {
            background-color: var(--button-secondary);
            color: var(--bg-dark);
        }

        .btn-substitute {
            background-color: #795548;
            color: var(--text-light);
            position: relative;
        }

        .decision-buttons button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        /* 替代品购买提示 */
        .substitute-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border: 3px solid var(--accent-yellow);
            border-radius: 15px;
            padding: 30px 40px;
            box-shadow: 0 0 50px rgba(255, 193, 7, 0.6);
            z-index: 1000;
            display: none;
            animation: popupAppear 0.3s ease;
        }

        @keyframes popupAppear {
            from {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }

            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .substitute-popup h3 {
            color: var(--accent-yellow);
            font-size: 1.8em;
            margin-bottom: 15px;
        }

        .substitute-popup p {
            font-size: 1.3em;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .substitute-popup button {
            padding: 12px 30px;
            font-size: 1.1em;
            background: var(--market-green);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 反馈区 */
        #feedback-area {
            min-height: 80px;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            background: #101030;
            color: var(--text-light);
            text-align: left;
            border-left: 5px solid var(--accent-yellow);
        }

        .feedback-message {
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        /* 评分页面样式 */
        #rating-screen {
            display: none;
            padding: 40px;
        }

        .rating-content {
            background: linear-gradient(135deg, #2a2a6a, #1e1e4a);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--theme-purple);
        }

        .rating-content h2 {
            color: var(--accent-yellow);
            font-size: 2em;
            margin-bottom: 30px;
        }

        .rating-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .rating-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--accent-yellow);
            font-size: 1.2em;
        }

        .rating-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #333;
            color: white;
            border: 2px solid var(--theme-purple);
            font-size: 1.1em;
            cursor: pointer;
        }

        .rating-group select:focus {
            outline: none;
            border-color: var(--accent-yellow);
        }

        .submit-rating-btn {
            padding: 15px 40px;
            font-size: 1.3em;
            background: var(--theme-purple);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .submit-rating-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(156, 39, 176, 0.5);
        }

        /* 最终回合样式 */
        .market-chaos {
            border-color: var(--market-red) !important;
            animation: neonRed 0.5s infinite alternate;
        }

        @keyframes neonRed {
            from {
                box-shadow: 0 0 10px var(--market-red);
            }

            to {
                box-shadow: 0 0 20px var(--market-red), 0 0 5px var(--market-red);
            }
        }

        /* 难度预告 */
        #difficulty-announcement {
            color: var(--accent-yellow);
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 开始页面 -->
        <div id="start-screen">
            <button class="audio-btn" id="start-audio-btn" onclick="toggleAudio()" title="播放/暂停音频">
                <svg class="sound-icon" viewBox="0 0 24 24">
                    <path
                        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                </svg>
                <div class="sound-waves">
                    <div class="sound-wave"></div>
                    <div class="sound-wave"></div>
                    <div class="sound-wave"></div>
                </div>
            </button>
            <h1>🔮 混乱魔法市场模拟器</h1>
            <p id="instruction-text">帮助魔法学徒采购材料！市场价格波动剧烈，请在倒计时内决定何时买入最划算。</p>
            <button onclick="startGame()"
                style="padding: 15px 30px; font-size: 1.3em; background: var(--market-green); color: white; border: none; border-radius: 30px; cursor: pointer; margin-top: 20px;">开始任务</button>
        </div>

        <!-- 准备页面 -->
        <div id="prepare-screen">
            <div class="prepare-content">
                <button class="audio-btn" id="prepare-audio-btn" onclick="toggleAudio('prepare')" title="播放/暂停音频"
                    style="position: absolute; top: 15px; right: 15px;">
                    <svg class="sound-icon" viewBox="0 0 24 24">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg>
                    <div class="sound-waves">
                        <div class="sound-wave"></div>
                        <div class="sound-wave"></div>
                        <div class="sound-wave"></div>
                    </div>
                </button>
                <h2>⏰ 准备阶段</h2>
                <p id="prepare-message">接下来是 <strong>第 1 回合</strong>！</p>
                <p>在这一轮中，你只有10s时间购买，你能以最合适的价格买进吗吗。</p>
                <button class="ready-btn" onclick="startRound()">✓ 准备好了！</button>
            </div>
        </div>

        <!-- 游戏页面 -->
        <div id="game-area">
            <div id="difficulty-announcement"></div>

            <div class="market-display" id="market-display">
                <div class="market-header">
                    <span id="material-name">---</span>
                    <span id="timer">准备中...</span>
                </div>
                <div id="current-price-display">
                    <span style="font-size: 1.5em; color: #a0a0a0;">当前价格: </span>
                    <span id="current-price">100</span>
                </div>
            </div>

            <div class="decision-buttons">
                <button class="btn-buy" id="btn-buy" onclick="handleDecision('buy')">🟢 现在买</button>
                <button class="btn-wait" id="btn-wait" onclick="handleDecision('wait')">🟡 等一下</button>
                <button class="btn-substitute" id="btn-substitute" onclick="handleSubstituteClick()">🔵 买替代品</button>
            </div>

            <div id="feedback-area">
                <div class="feedback-message" id="current-feedback">市场正在波动中...</div>
                <div class="feedback-message" id="wallet-status">钱包余额：500 魔法币</div>
            </div>
        </div>

        <!-- 替代品购买弹窗 -->
        <div class="substitute-popup" id="substitute-popup">
            <h3>🔵 购买替代品</h3>
            <p id="substitute-info">你已经购买了替代品！<br>价格：<strong>110 魔法币</strong></p>
            <button onclick="closeSubstitutePopup()">确定</button>
        </div>

        <!-- 评分页面 -->
        <div id="rating-screen">
            <div class="rating-content" style="position: relative;">
                <button class="audio-btn" id="rating-audio-btn" onclick="toggleAudio('rating')" title="播放/暂停音频"
                    style="position: absolute; top: 15px; right: 15px;">
                    <svg class="sound-icon" viewBox="0 0 24 24">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg>
                    <div class="sound-waves">
                        <div class="sound-wave"></div>
                        <div class="sound-wave"></div>
                        <div class="sound-wave"></div>
                    </div>
                </button>
                <h2>📊 本回合评分</h2>
                <p style="font-size: 1.1em; color: var(--text-light); margin-bottom: 30px;">请对刚才的回合进行评分：</p>

                <div class="rating-group">
                    <label for="tension-rating">本回合的 <strong>紧张程度</strong>（1 = 不紧张，10 = 非常紧张）</label>
                    <select id="tension-rating">
                        <option value="1">1 - 完全不紧张</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5" selected>5 - 中等紧张</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10 - 非常紧张</option>
                    </select>
                </div>

                <div class="rating-group">
                    <label for="fun-rating">本回合的 <strong>好玩程度</strong>（1 = 不好玩，10 = 非常好玩）</label>
                    <select id="fun-rating">
                        <option value="1">1 - 完全不好玩</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5" selected>5 - 还可以</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10 - 非常好玩</option>
                    </select>
                </div>

                <button class="submit-rating-btn" onclick="submitRating()">提交评分，进入下一回合 →</button>
            </div>
        </div>

        <!-- 结束页面 -->
        <div id="end-screen"
            style="display: none; padding: 30px; background: var(--market-green); border-radius: 15px;">
            <h2>🎉 星际挑战任务完成！</h2>
            <p style="font-size: 1.2em;">你已成功完成了所有材料的采购任务。你表现得像一个真正的市场探险家！</p>
            <div class="portal-cloud-panel" style="margin-top:18px; color:white; background: rgba(0,0,0,0.2);">
                <h3>云端记录</h3>
                <p>完成游戏后会自动上传到云端；你也可以手动点击按钮再次上传。</p>
                <button class="portal-cloud-save-btn" type="button" onclick="saveResultsToCloud()">☁️ 保存到云端</button>
                <button class="portal-cloud-save-btn" type="button" onclick="goToNextGame()" style="margin-top:10px;">➡️ 前往下一个游戏</button>
                <p id="cloud-save-status" class="portal-cloud-status"></p>
            </div>
            <p id="save-status" style="margin-top: 15px; color: var(--bg-dark); font-weight: bold;"></p>
        </div>

    </div>

    <div id="portal-game-status"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/game-portal.js"></script>
    <script>
        // --- 音频控制 ---
        let currentAudio = null;
        let currentAudioType = null;

        const audioFiles = {
            start: 'music/1.m4a',
            prepare: 'music/在这一轮中，你只有10s时间购买，你能以最合适的价格买进吗吗.m4a',
            rating: 'music/紧张好玩程度.m4a'
        };

        function toggleAudio(type = 'start') {
            const btnId = type === 'start' ? 'start-audio-btn' : `${type}-audio-btn`;
            const btn = document.getElementById(btnId);
            const audioFile = audioFiles[type];

            if (!btn || !audioFile) return;

            // 如果切换了不同的音频源，停止当前播放
            if (currentAudioType !== type && currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                const oldBtnId = currentAudioType === 'start' ? 'start-audio-btn' : `${currentAudioType}-audio-btn`;
                const oldBtn = document.getElementById(oldBtnId);
                if (oldBtn) oldBtn.classList.remove('playing');
            }

            // 如果是同一个音频
            if (currentAudioType === type && currentAudio) {
                if (currentAudio.paused) {
                    currentAudio.play();
                    btn.classList.add('playing');
                } else {
                    currentAudio.pause();
                    btn.classList.remove('playing');
                }
                return;
            }

            // 创建新的音频
            currentAudio = new Audio(audioFile);
            currentAudioType = type;

            currentAudio.addEventListener('ended', function () {
                btn.classList.remove('playing');
            });

            currentAudio.play();
            btn.classList.add('playing');
        }

        // 自动播放页面音频的辅助函数
        function playAudioForPage(type) {
            const btnId = `${type}-audio-btn`;
            const btn = document.getElementById(btnId);
            const audioFile = audioFiles[type];

            if (!btn || !audioFile) return;

            // 停止当前音频
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                if (currentAudioType) {
                    const oldBtnId = currentAudioType === 'start' ? 'start-audio-btn' : `${currentAudioType}-audio-btn`;
                    const oldBtn = document.getElementById(oldBtnId);
                    if (oldBtn) oldBtn.classList.remove('playing');
                }
            }

            // 创建并播放新音频
            currentAudio = new Audio(audioFile);
            currentAudioType = type;

            currentAudio.addEventListener('ended', function () {
                btn.classList.remove('playing');
            });

            currentAudio.play();
            btn.classList.add('playing');
        }

        // --- 游戏配置：4 轮平滑难度递增 ---
        const MAX_ROUNDS = 4;
        const START_PRICE_INTERVAL = 500;
        const END_PRICE_INTERVAL = 50;
        const START_MAX_FLUCTUATION = 20;
        const END_MAX_FLUCTUATION = 80;
        const START_TIMER = 10;
        const END_TIMER = 5;
        const BASE_MATERIAL_PRICE = 100;
        const SUB_COST = 110;

        // 随机材料名称列表
        const MATERIAL_NAMES = [
            "风之药草", "大地之石", "烈焰晶体", "星辰尘埃", "月光露水",
            "暗影蘑菇", "雷鸣精粹", "时间沙漏", "空间碎片", "混沌之油"
        ];

        // --- 游戏状态变量 ---
        let currentRoundIndex = 0;
        let roundStartedAt = null;
        let currentMaterialName = '';
        let currentPrice = 0;
        let wallet = 500;
        let priceInterval;
        let timerInterval;
        let roundTimer;
        let isDecisionLocked = false;
        let gameData = [];
        let currentDifficulty = null;
        let hasAutoUploadedRecord = false;
        let hasScheduledNextGame = false;
        function goToNextGame() {
            if (window.GamePortal) {
                window.GamePortal.goToNextGame('magic-market');
            }
        }

        // --- DOM 元素引用 ---
        const startScreen = document.getElementById('start-screen');
        const prepareScreen = document.getElementById('prepare-screen');
        const gameArea = document.getElementById('game-area');
        const ratingScreen = document.getElementById('rating-screen');
        const endScreen = document.getElementById('end-screen');
        const materialNameDisplay = document.getElementById('material-name');
        const priceDisplay = document.getElementById('current-price');
        const timerDisplay = document.getElementById('timer');
        const currentFeedback = document.getElementById('current-feedback');
        const walletStatus = document.getElementById('wallet-status');
        const marketDisplay = document.getElementById('market-display');
        const difficultyAnnouncement = document.getElementById('difficulty-announcement');
        const btnBuy = document.getElementById('btn-buy');
        const btnWait = document.getElementById('btn-wait');
        const btnSubstitute = document.getElementById('btn-substitute');
        const tensionRating = document.getElementById('tension-rating');
        const funRating = document.getElementById('fun-rating');
        const substitutePopup = document.getElementById('substitute-popup');

        window.addEventListener('load', function () {
            setTimeout(() => {
                playAudioForPage('start');
            }, 250);
        });

        // --- 核心功能 ---

        function startGame() {
            // 停止当前音频
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                const oldBtnId = currentAudioType === 'start' ? 'start-audio-btn' : `${currentAudioType}-audio-btn`;
                const oldBtn = document.getElementById(oldBtnId);
                if (oldBtn) oldBtn.classList.remove('playing');
            }

            startScreen.style.display = 'none';
            currentRoundIndex = 0;
            wallet = 500;
            updateWallet(0);
            showPrepareScreen();
        }

        // 显示准备页面
        function showPrepareScreen() {
            if (currentRoundIndex >= MAX_ROUNDS) {
                endGame();
                return;
            }

            startScreen.style.display = 'none';
            gameArea.style.display = 'none';
            ratingScreen.style.display = 'none';

            // 更新准备页面内容
            const roundNum = currentRoundIndex + 1;
            document.getElementById('prepare-message').innerHTML =
                `接下来是 <strong>第 ${roundNum} / ${MAX_ROUNDS} 回合</strong>！`;

            // 显示准备页面
            prepareScreen.classList.add('show');

            // 自动播放准备页面录音
            setTimeout(() => {
                playAudioForPage('prepare');
            }, 300);
        }

        // 根据当前回合数计算难度参数
        function calculateDifficulty(round) {
            const progress = round / (MAX_ROUNDS - 1);

            const maxFluctuation = START_MAX_FLUCTUATION + (END_MAX_FLUCTUATION - START_MAX_FLUCTUATION) * progress * 0.5;
            const updateInterval = START_PRICE_INTERVAL - (START_PRICE_INTERVAL - END_PRICE_INTERVAL) * progress * 0.5;
            const timer = START_TIMER - (START_TIMER - END_TIMER) * progress * 0.5;

            return {
                maxFluctuation: Math.round(maxFluctuation),
                updateInterval: Math.round(updateInterval),
                timer: Math.max(END_TIMER, Math.round(timer))
            };
        }

        // 开始本轮游戏
        function startRound() {
            // 停止准备页面的音频
            if (currentAudio && currentAudioType === 'prepare') {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                const prepareBtn = document.getElementById('prepare-audio-btn');
                if (prepareBtn) prepareBtn.classList.remove('playing');
            }

            prepareScreen.classList.remove('show');
            gameArea.style.display = 'block';

            if (priceInterval) clearInterval(priceInterval);
            if (timerInterval) clearInterval(timerInterval);

            isDecisionLocked = false;

            const isFinalRound = currentRoundIndex === MAX_ROUNDS - 1;

            currentDifficulty = calculateDifficulty(currentRoundIndex);
            currentMaterialName = MATERIAL_NAMES[currentRoundIndex % MATERIAL_NAMES.length] + ' (R' + (currentRoundIndex + 1) + ')';
            currentPrice = BASE_MATERIAL_PRICE + (currentRoundIndex * 5);

            // --- 界面和预告 ---
            materialNameDisplay.textContent = currentMaterialName;
            priceDisplay.textContent = currentPrice;
            currentFeedback.textContent = `市场正在为 ${currentMaterialName} 波动...`;

            // 立即重置倒计时显示
            const nextRoundTime = isFinalRound ? END_TIMER : currentDifficulty.timer;
            timerDisplay.textContent = `${nextRoundTime}s`;
            timerDisplay.classList.remove('warning');

            if (isFinalRound) {
                difficultyAnnouncement.textContent = "🌪️ 最终回合：市场崩盘测试！所有材料价格剧烈震荡！";
                marketDisplay.classList.add('market-chaos');
                btnBuy.textContent = "🚀 果断买入";
                btnWait.textContent = "🛡️ 停止交易";
                btnSubstitute.textContent = "🔄 换市场";
                btnWait.classList.add('btn-substitute');
                btnSubstitute.classList.remove('btn-substitute');
            } else {
                difficultyAnnouncement.textContent = `市场波动等级提升！波动范围 ±${currentDifficulty.maxFluctuation} 币，倒计时 ${currentDifficulty.timer} 秒。`;
                marketDisplay.classList.remove('market-chaos');
                btnBuy.textContent = "🟢 现在买";
                btnWait.textContent = "🟡 等一下";
                btnSubstitute.textContent = "🔵 买替代品";
                btnWait.classList.remove('btn-substitute');
                btnSubstitute.classList.add('btn-substitute');
            }

            enableButtons(false);

            // 1秒预备后开始波动和计时（从3秒减少到1秒）
            setTimeout(() => {
                startPriceFluctuation(currentDifficulty.maxFluctuation, currentDifficulty.updateInterval, isFinalRound);
                startRoundTimer(isFinalRound ? END_TIMER : currentDifficulty.timer);
                enableButtons(true);
                // 记录该轮的开始时间（倒计时正式开始的瞬间）
                roundStartedAt = Date.now();
            }, 1000);

            currentRoundIndex++;
        }

        // 价格波动模拟
        function startPriceFluctuation(maxFluctuation, updateInterval, isFinalRound) {
            if (priceInterval) clearInterval(priceInterval);

            const fluctuationFactor = isFinalRound ? 1.5 : 0.2;

            priceInterval = setInterval(() => {
                if (isDecisionLocked) return;

                let change = (Math.random() - 0.5) * maxFluctuation * fluctuationFactor;
                let newPrice = currentPrice + change;

                newPrice = Math.max(BASE_MATERIAL_PRICE - 50, newPrice);
                newPrice = Math.min(BASE_MATERIAL_PRICE + 300, newPrice);

                let priceDelta = Math.round(newPrice - currentPrice);

                currentPrice = Math.round(newPrice);
                priceDisplay.textContent = currentPrice;

                // 增强价格变化的视觉反馈
                if (priceDelta > 0) {
                    priceDisplay.style.color = varToHex('--market-red');
                    priceDisplay.style.transform = 'scale(1.1)';
                } else if (priceDelta < 0) {
                    priceDisplay.style.color = varToHex('--market-green');
                    priceDisplay.style.transform = 'scale(1.1)';
                } else {
                    priceDisplay.style.color = varToHex('--text-light');
                }

                // 恢复原始大小
                setTimeout(() => {
                    priceDisplay.style.transform = 'scale(1)';
                }, 200);
            }, updateInterval);
        }

        // 倒计时模拟
        function startRoundTimer(timerDuration) {
            if (timerInterval) clearInterval(timerInterval);
            roundTimer = timerDuration;
            timerDisplay.textContent = `${roundTimer}s`;
            timerDisplay.classList.remove('warning');

            timerInterval = setInterval(() => {
                roundTimer--;
                timerDisplay.textContent = `${roundTimer}s`;

                // 当剩余时间小于等于3秒时，添加警告样式
                if (roundTimer <= 3) {
                    timerDisplay.classList.add('warning');
                }

                if (roundTimer <= 0) {
                    handleTimeout();
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        // 超时处理
        function handleTimeout() {
            isDecisionLocked = true;
            clearInterval(priceInterval);
            enableButtons(false);

            const isFinalRound = currentRoundIndex === MAX_ROUNDS;

            if (isFinalRound) {
                currentFeedback.innerHTML = `计时结束！你**冻结不动**，错过了交易机会！ (交易回避)`;
                recordDecision('timeout-freeze', currentPrice, 0, '重大波动下冻结不动，交易回避');
            } else {
                let subCost = SUB_COST;
                updateWallet(-subCost);
                currentFeedback.innerHTML = `计时结束！你**被迫买了**稳定但较贵的替代品（-${subCost} 币）。<br>下次要更快哦！`;
                recordDecision('timeout-sub', currentPrice, subCost, '被迫购买替代品');
            }

            setTimeout(showRatingScreen, 2000);
        }

        // 处理用户的决策
        function handleDecision(type) {
            if (isDecisionLocked) return;

            isDecisionLocked = true;
            clearInterval(priceInterval);
            clearInterval(timerInterval);
            enableButtons(false);

            let finalPrice = currentPrice;
            let finalAction = '';
            let cost = 0;

            const isFinalRound = currentRoundIndex === MAX_ROUNDS;

            if (isFinalRound) {
                // --- 最终回合逻辑 ---
                if (type === 'buy') {
                    cost = finalPrice;
                    updateWallet(-cost);
                    finalAction = `你选择了**果断买入**（-${cost} 币），承受住了市场的巨大波动！`;
                    recordDecision('final-buy', finalPrice, cost, '最终轮果断买入/恐慌性购买');
                } else if (type === 'wait') {
                    finalAction = `你选择了**停止交易**，回避了市场的混乱！`;
                    recordDecision('final-stop', finalPrice, 0, '最终轮停止交易/回避风险');
                } else if (type === 'substitute') {
                    finalAction = `你选择了**换市场**，决定寻找更稳定的交易场所！`;
                    recordDecision('final-switch', finalPrice, 0, '最终轮换市场/适应性应对');
                }

            } else {
                // --- 普通回合逻辑 ---
                if (type === 'buy') {
                    let futureChange = Math.round((Math.random() * 0.2 - 0.1) * currentPrice * 0.2);
                    let futurePrice = finalPrice + futureChange;
                    cost = finalPrice;
                    updateWallet(-cost);
                    finalAction = `你以 ${finalPrice} 币购买了 ${currentMaterialName}。`;
                    finalAction += (futureChange < 0) ? `<br>刚买完，价格立刻降到了 ${futurePrice}！😱 你买贵了 ${Math.abs(futureChange)} 币。` : `<br>市场价格稳定。`;
                    recordDecision('buy', finalPrice, cost, finalAction);

                } else if (type === 'wait') {
                    let waitChange = Math.round((Math.random() * 0.4 + 0.1) * currentPrice * 0.2);
                    let newWaitPrice = finalPrice + waitChange;
                    cost = newWaitPrice;
                    updateWallet(-cost);
                    finalAction = `你选择了等待，但价格立刻暴涨到 ${newWaitPrice} 币！`;
                    finalAction += `<br>你最终以高价（${newWaitPrice} 币）购入 ${currentMaterialName}。`;
                    recordDecision('wait', finalPrice, cost, finalAction);

                } else if (type === 'substitute') {
                    cost = SUB_COST;
                    updateWallet(-cost);
                    finalAction = `你选择了稳妥路线，以 ${cost} 币购买了替代品。市场波动与你无关。`;
                    recordDecision('substitute', finalPrice, cost, finalAction);
                }
            }

            currentFeedback.innerHTML = finalAction;
            setTimeout(showRatingScreen, 3000);
        }

        // 处理替代品点击
        function handleSubstituteClick() {
            if (isDecisionLocked) return;

            // 显示弹窗
            document.getElementById('substitute-info').innerHTML =
                `你已经购买了替代品！<br>价格：<strong>${SUB_COST} 魔法币</strong>`;
            substitutePopup.style.display = 'block';

            // 3秒后自动确认购买
            setTimeout(() => {
                if (substitutePopup.style.display === 'block') {
                    closeSubstitutePopup();
                    handleDecision('substitute');
                }
            }, 3000);
        }

        // 关闭替代品弹窗并执行购买
        function closeSubstitutePopup() {
            substitutePopup.style.display = 'none';
            if (!isDecisionLocked) {
                handleDecision('substitute');
            }
        }

        // 显示评分页面
        function showRatingScreen() {
            gameArea.style.display = 'none';
            ratingScreen.style.display = 'block';

            // 重置评分到中间值
            tensionRating.value = 5;
            funRating.value = 5;

            // 自动播放评分页面录音
            setTimeout(() => {
                playAudioForPage('rating');
            }, 300);
        }

        // 提交评分
        function submitRating() {
            const tension = parseInt(tensionRating.value);
            const fun = parseInt(funRating.value);

            // 记录在最新一条数据上
            if (gameData.length > 0) {
                gameData[gameData.length - 1].tension = tension;
                gameData[gameData.length - 1].fun = fun;
            }

            // 隐藏评分页面并立即显示准备页面
            ratingScreen.style.display = 'none';
            showPrepareScreen();
        }

        // 启用/禁用决策按钮
        function enableButtons(enable) {
            [btnBuy, btnWait, btnSubstitute].forEach(btn => btn.disabled = !enable);
        }

        // 更新钱包状态
        function updateWallet(amount) {
            wallet += amount;
            walletStatus.textContent = `钱包余额：${wallet} 魔法币`;
        }

        // 记录完整决策数据
        function recordDecision(type, priceAtDecision, finalCost, outcome) {
            const submittedAtMs = Date.now();
            const startedAtMs = roundStartedAt || submittedAtMs;
            const elapsedSeconds = Math.max(0, Math.round((submittedAtMs - startedAtMs) / 1000));
            gameData.push({
                round: currentRoundIndex,
                material: currentMaterialName,
                decisionType: type,
                price: priceAtDecision,
                cost: finalCost,
                outcome: outcome,
                wallet: wallet,
                tension: null,
                fun: null,
                startedAt: new Date(startedAtMs).toISOString(),
                submittedAt: new Date(submittedAtMs).toISOString(),
                elapsedSeconds: elapsedSeconds
            });
            console.log(`[R${currentRoundIndex}] Decision (${elapsedSeconds}s):`, gameData[gameData.length - 1]);
            // 重置，准备下一轮
            roundStartedAt = null;
        }

        function endGame() {
            prepareScreen.style.display = 'none';
            gameArea.style.display = 'none';
            ratingScreen.style.display = 'none';
            endScreen.style.display = 'block';
            console.log("--- 最终游戏数据 ---", gameData);
            if (!hasAutoUploadedRecord) {
                saveResultsToCloud();
            }
            if (window.GamePortal && !hasScheduledNextGame) {
                hasScheduledNextGame = true;
                window.GamePortal.scheduleNextGame('magic-market', { statusTarget: '#cloud-save-status', delayMs: 5000 });
            }
        }

        function buildMagicMarketRecord() {
            const now = new Date();
            let textContent = '';
            textContent += `保存时间: ${now.toLocaleString()}\n`;
            textContent += `最终钱包: ${wallet} 魔法币\n`;
            textContent += `总回合数: ${gameData.length}\n`;
            textContent += `\n===== 回合明细 =====\n`;

            gameData.forEach((item, index) => {
                textContent += `\n[第 ${index + 1} 回合]\n`;
                textContent += `材料: ${item.material}\n`;
                textContent += `决策类型: ${item.decisionType}\n`;
                textContent += `决策时价格: ${item.price}\n`;
                textContent += `最终花费: ${item.cost}\n`;
                textContent += `结果描述: ${String(item.outcome).replace(/<br>/g, ' / ').replace(/<[^>]*>/g, '')}\n`;
                textContent += `当前钱包: ${item.wallet}\n`;
                textContent += `本轮提交耗时: ${item.elapsedSeconds ?? '未记录'} 秒\n`;
                textContent += `紧张评分: ${item.tension ?? '未评分'}\n`;
                textContent += `好玩评分: ${item.fun ?? '未评分'}\n`;
            });

            return {
                summary: `最终钱包 ${wallet} 魔法币，共 ${gameData.length} 回合`,
                markdown: textContent,
                detailJson: {
                    finalWallet: wallet,
                    rounds: gameData.map((item) => ({ ...item }))
                }
            };
        }

        async function saveResultsToCloud() {
            const statusEl = document.getElementById('cloud-save-status');
            if (!gameData || gameData.length === 0) {
                statusEl.textContent = '暂无可保存的结果。';
                return;
            }
            if (!window.GamePortal) {
                statusEl.textContent = '公共云端模块未加载成功';
                return;
            }
            statusEl.textContent = '正在保存到云端...';
            try {
                const record = buildMagicMarketRecord();
                const result = await window.GamePortal.saveRecord({
                    gameKey: 'magic-market',
                    gameTitle: '魔法市场',
                    recordType: 'assessment',
                    resultType: '魔法市场结果',
                    summary: record.summary,
                    recordMarkdown: record.markdown,
                    detailJson: record.detailJson
                });
                statusEl.textContent = result.message;
                hasAutoUploadedRecord = true;
            } catch (error) {
                statusEl.textContent = `保存失败：${error.message || '请稍后重试'}`;
            }
        }

        // 辅助函数：转换CSS变量到十六进制值
        function varToHex(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }

        if (window.GamePortal) {
            window.GamePortal.renderGameStatus('#portal-game-status', { homeHref: '../home.html' });
        }
    </script>

</body>
