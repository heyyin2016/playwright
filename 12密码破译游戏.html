<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际密码破译：深空探险</title>
    <link rel="stylesheet" href="./shared/game-portal.css">
    <style>
        .portal-game-status {
            border: 1px solid rgba(0, 255, 153, 0.42);
            background: rgba(13, 17, 23, 0.92);
            color: #b8ffd9;
            box-shadow: 0 0 22px rgba(0, 255, 153, 0.18);
            margin-top: 18px;
        }
        .portal-home-link { color: #00ff99; text-shadow: 0 0 8px rgba(0,255,153,0.35); }
        /* CSS 样式保持不变 */
        body {
            font-family: 'Monospace', 'Consolas', monospace;
            background-color: #0d1117;
            color: #00ff99;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 800px;
            border: 2px solid #00ff99;
            box-shadow: 0 0 15px #00ff99;
            padding: 20px;
            box-sizing: border-box;
            background-color: #161b22;
            display: grid;
            grid-template-areas:
                "terminal log"
                "input input";
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        #terminal-display {
            grid-area: terminal;
            min-height: 300px;
            padding: 10px;
            border-right: 1px solid #00ff99;
        }

        .system-status {
            color: #ffcc00;
            margin-bottom: 15px;
        }

        .feedback-wrong-position {
            color: #ffcc00;
        }
        .feedback-not-exist {
            color: #ff5733;
        }

        #log-file {
            grid-area: log;
            max-height: 320px;
            overflow-y: auto;
            border-left: 1px solid #00ff99;
            padding-left: 20px;
        }
        #log-file h3 {
            color: #ffcc00;
            margin-top: 0;
            border-bottom: 1px dashed #ffcc00;
            padding-bottom: 5px;
        }

        .log-entry {
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        #input-panel {
            grid-area: input;
            padding-top: 20px;
            border-top: 2px solid #00ff99;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-digit {
            width: 40px;
            height: 40px;
            font-size: 1.5em;
            text-align: center;
            background-color: #2c333e;
            color: #00ff99;
            border: 1px solid #00ff99;
        }

        #submit-button {
            padding: 10px 20px;
            background-color: #00ff99;
            color: #0d1117;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        #submit-button:hover:not(:disabled) {
            background-color: #00cc88;
        }
        #submit-button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="game-container">

    <div id="terminal-display">
        <h2>🚀 星际密码破译 (Cosmic Cipher)</h2>
        <div class="system-status">
            &gt; **[系统启动：深空探险号]**
            &gt; **任务目标：破译中央星核密码，寻找 6 位数字的正确序列。**
            &gt; **请注意：输入必须为 6 个 1-9 的数字。**
        </div>
        <p id="current-prompt">**你的第一次尝试：**</p>
        <div id="feedback-message"></div>
    </div>

    <div id="log-file">
        <h3>[探索日志]</h3>
    </div>

    <div id="input-panel">
        <label>输入序列:</label>
        <input type="number" min="1" max="9" class="input-digit" id="d1" value="1">
        <input type="number" min="1" max="9" class="input-digit" id="d2" value="2">
        <input type="number" min="1" max="9" class="input-digit" id="d3" value="3">
        <input type="number" min="1" max="9" class="input-digit" id="d4" value="4">
        <input type="number" min="1" max="9" class="input-digit" id="d5" value="5">
        <input type="number" min="1" max="9" class="input-digit" id="d6" value="6">

        <button id="submit-button">启动破译</button>
    </div>

</div>

<div id="portal-game-status"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./shared/game-portal.js"></script>
<script>
    const MAX_ATTEMPTS = 20;
    let attemptCount = 0;
    const submitButton = document.getElementById('submit-button');
    const digitInputs = document.querySelectorAll('.input-digit');
    const feedbackMessage = document.getElementById('feedback-message');
    const logFile = document.getElementById('log-file');
    const logContainer = logFile;

    // --- 随机生成正确密码（6位，每位1-9）---
    const SECRET_CODE = [];
    for (let i = 0; i < 6; i++) {
        SECRET_CODE.push(Math.floor(Math.random() * 9) + 1);
    }
    console.log('[系统] 正确密码（仅后台可见）:', SECRET_CODE.join(''));

    // --- 后台数据收集功能 ---
    const SESSION_ID = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    let sessionData = [];
    let gameStartTime = Date.now();
    let lastAttemptTime = Date.now();
    let lastGuess = '';
    let isGameEnded = false;

    // 对比两次输入，找出变化的位数
    function getChanges(currentGuess, previousGuess) {
        if (!previousGuess || previousGuess.length !== 6) {
            return '首次输入，无变化对比';
        }

        const changes = [];
        for (let i = 0; i < 6; i++) {
            if (currentGuess[i] !== previousGuess[i]) {
                changes.push(`第${i + 1}位: ${previousGuess[i]} → ${currentGuess[i]}`);
            }
        }

        if (changes.length === 0) {
            return '未调整任何位数';
        }
        return changes.join('；');
    }

    // 保存数据到本地数组
    function saveToBackend(guess, feedbackText) {
        const currentTime = Date.now();
        const timeSinceLastAttempt = Math.floor((currentTime - lastAttemptTime) / 1000);
        const totalTime = Math.floor((currentTime - gameStartTime) / 1000);

        const record = {
            sessionId: SESSION_ID,
            timestamp: new Date().toLocaleString('zh-CN'),
            attemptNumber: attemptCount,
            guess: guess,
            result: feedbackText,
            本次用时秒: timeSinceLastAttempt,
            累计用时秒: totalTime,
            本次调整: getChanges(guess, lastGuess)
        };

        sessionData.push(record);
        console.log('[后台记录]', record);

        lastAttemptTime = currentTime;
        lastGuess = guess;

        return record;
    }

    // 导出最终报告
    function exportFinalReport() {
        const gameEndTime = Date.now();
        const totalTimeSeconds = Math.floor((gameEndTime - gameStartTime) / 1000);
        const minutes = Math.floor(totalTimeSeconds / 60);
        const seconds = totalTimeSeconds % 60;

        const avgTime = attemptCount > 0 ? (totalTimeSeconds / attemptCount).toFixed(1) : 0;

        const report = {
            会话ID: SESSION_ID,
            游戏开始时间: new Date(gameStartTime).toLocaleString('zh-CN'),
            游戏结束时间: new Date(gameEndTime).toLocaleString('zh-CN'),
            总用时: `${minutes}分${seconds}秒`,
            总尝试次数: attemptCount,
            平均每次用时秒: avgTime,
            每次破解记录: sessionData
        };

        const dataStr = JSON.stringify(report, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = `密码破译报告_${SESSION_ID.slice(-6)}_${new Date().toLocaleDateString('zh-CN')}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        console.log('=== 最终报告已导出 ===', report);
    }

    // --- 真实反馈：只有两类（位置错误 + 完全错误）---
    function getAccurateFeedback(guessArray) {
        let wrongPositions = [];        // 数字存在但位置错
        let notExistPositions = [];     // 数字完全不存在

        // 复制秘密数组用于匹配
        const secretCopy = [...SECRET_CODE];
        const guessCopy = [...guessArray];

        // 第一遍：先找出所有数字存在的情况（不管位置），标记已使用的秘密数字
        // 先检查每位，如果数字存在于秘密中（且未被占用），则标记
        // 但要注意：同一个数字不能重复匹配
        
        // 更简单的方法：遍历每个猜测数字，看它是否在秘密中（且未被匹配过）
        const secretMatched = new Array(6).fill(false);
        
        for (let i = 0; i < 6; i++) {
            // 在秘密中寻找相同的数字（且未被匹配过）
            let foundIndex = -1;
            for (let j = 0; j < 6; j++) {
                if (!secretMatched[j] && guessArray[i] === SECRET_CODE[j]) {
                    foundIndex = j;
                    break;
                }
            }
            
            if (foundIndex !== -1) {
                // 数字存在
                if (i === foundIndex) {
                    // 位置也正确 —— 但根据要求，不显示给玩家，只内部记录，不显示正确反馈
                    // 我们仍然标记为已匹配，但不输出任何提示
                    secretMatched[foundIndex] = true;
                    // 注意：不添加到任何反馈列表
                } else {
                    // 位置错误
                    wrongPositions.push(i + 1);
                    secretMatched[foundIndex] = true;
                }
            }
            // 如果数字不存在于秘密中，稍后处理
        }
        
        // 找出所有完全错误的位（既不是正确位置，也不是位置错误）
        for (let i = 0; i < 6; i++) {
            // 检查这个数字是否存在于秘密中
            let exists = false;
            for (let j = 0; j < 6; j++) {
                if (guessArray[i] === SECRET_CODE[j]) {
                    exists = true;
                    break;
                }
            }
            
            if (!exists) {
                notExistPositions.push(i + 1);
            } else {
                // 数字存在，但检查是否已经被标记为位置错误
                // 如果既不是位置错误，也不是正确位置（正确位置不显示），那就是正确位置的情况，不显示任何反馈
                if (wrongPositions.indexOf(i + 1) === -1) {
                    // 这是数字正确且位置正确的情况 —— 不显示任何反馈（静默）
                    // 什么都不做
                }
            }
        }

        // 构建反馈文本（只显示两类）
        let feedbackHtml = '';
        
        if (wrongPositions.length > 0) {
            feedbackHtml += `<div class="feedback-wrong-position">⚠️ 第 ${wrongPositions.join('、')} 位数字存在但位置错误</div>`;
        }
        
        if (notExistPositions.length > 0) {
            feedbackHtml += `<div class="feedback-not-exist">❌ 第 ${notExistPositions.join('、')} 位数字完全错误</div>`;
        }

        if (wrongPositions.length === 0 && notExistPositions.length === 0) {
            // 理论上如果所有数字都正确且位置正确，这里会显示空
            // 但根据规则，我们不告诉玩家完全正确，只显示一条中性消息
            feedbackHtml = `<div style="color: #00ff99;">🔍 扫描完成，未发现异常信号</div>`;
        }

        const generalText = `位置错误:${wrongPositions.length} 完全错误:${notExistPositions.length}`;
        
        // 计算正确位置的数量（用于内部判断是否完全破解）
        let correctCount = 0;
        for (let i = 0; i < 6; i++) {
            if (guessArray[i] === SECRET_CODE[i]) {
                correctCount++;
            }
        }
        
        return { feedbackHtml, generalText, correctCount };
    }

    // --- 核心处理函数 ---
    function processAttempt() {
        if (isGameEnded || attemptCount >= MAX_ATTEMPTS) {
            return;
        }

        // 1. 获取玩家输入
        const guess = Array.from(digitInputs).map(input => input.value).join('');
        const guessArray = Array.from(digitInputs).map(input => parseInt(input.value));

        // 2. 增加尝试次数
        attemptCount++;

        // 3. 生成真实反馈（只有位置错误 + 完全错误）
        const accurateFeedback = getAccurateFeedback(guessArray);

        // 4. 更新界面反馈
        feedbackMessage.innerHTML = accurateFeedback.feedbackHtml;

        // 5. 保存到后台
        saveToBackend(guess, accurateFeedback.generalText);

        // 6. 更新日志
        const logEntry = document.createElement('div');
        logEntry.className = 'log-entry';
        logEntry.innerHTML = `[尝试 ${attemptCount}] 猜测：${guess} | 结果：${accurateFeedback.generalText}`;
        logContainer.insertBefore(logEntry, logContainer.children[1]);
        logContainer.scrollTop = 0;

        // 7. 检查是否完美破解（内部判断，但玩家看不到正确位置提示）
        if (accurateFeedback.correctCount === 6) {
            feedbackMessage.innerHTML = `<div style="color: #00ff99; font-size: 1.3em;">🎉 恭喜！密码破解成功！ 🎉<br>所有数字都已就位！</div>`;
            isGameEnded = true;
            submitButton.disabled = true;
            showQuestionnaire();
            return;
        }

        // 8. 检查是否需要结束
        if (attemptCount >= MAX_ATTEMPTS) {
            endGameFailure();
        } else {
            askToContinue();
        }
    }

    // 询问是否继续
    function askToContinue() {
        submitButton.disabled = true;

        const continueDiv = document.createElement('div');
        continueDiv.id = 'continue-prompt';
        continueDiv.style.cssText = 'margin-top: 15px; padding: 10px; border: 1px solid #00ff99; background: #1a2f23;';
        continueDiv.innerHTML = `
            <p style="color: #ffcc00; margin: 0 0 10px 0;">第 ${attemptCount} 次破译完成。是否继续尝试？</p>
            <button id="continue-btn" style="padding: 8px 20px; margin-right: 10px; background: #00ff99; border: none; cursor: pointer;">继续破译</button>
            <button id="stop-btn" style="padding: 8px 20px; background: #ff5733; border: none; cursor: pointer; color: white;">停止并导出报告</button>
        `;

        feedbackMessage.appendChild(continueDiv);

        document.getElementById('continue-btn').addEventListener('click', () => {
            document.getElementById('continue-prompt').remove();
            submitButton.disabled = false;
        });

        document.getElementById('stop-btn').addEventListener('click', () => {
            endGameByUserChoice();
        });
    }

    function endGameByUserChoice() {
        isGameEnded = true;
        submitButton.disabled = true;
        showQuestionnaire();
    }

    function endGameFailure() {
        isGameEnded = true;
        submitButton.disabled = true;
        submitButton.textContent = '系统已锁定';
        showQuestionnaire();
    }

    // 显示问卷
    function showQuestionnaire() {
        isGameEnded = true;
        submitButton.disabled = true;
        submitButton.textContent = '已停止';

        feedbackMessage.innerHTML = `
            <div style="color: #00ff99; font-size: 1em; margin-top: 20px; text-align: left;">
                <p style="color: #ffcc00; font-size: 1.1em; font-weight: bold;">游戏已结束！请回答以下问题：</p>

                <div style="margin: 15px 0; padding: 10px; border: 1px solid #00ff99; background: #1a2f23;">
                    <p style="margin: 0 0 10px 0;"><strong>问题1（语音输入）：</strong>你觉得这个游戏难吗？如果还有从头开始的机会，你会采用同样的破解方式吗？</p>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <button id="start-record" style="padding: 8px 15px; background: #ff5733; color: white; border: none; cursor: pointer;">🎤 开始录音</button>
                        <button id="stop-record" style="padding: 8px 15px; background: #555; color: white; border: none; cursor: not-allowed;" disabled>⏹ 停止录音</button>
                        <span id="recording-status" style="color: #ffcc00; line-height: 32px;"></span>
                    </div>
                    <textarea id="q1-answer" rows="4" style="width: 100%; background: #2c333e; color: #00ff99; border: 1px solid #00ff99; padding: 8px; box-sizing: border-box; resize: vertical;" placeholder="点击开始录音，说出你的回答..."></textarea>
                </div>

                <div style="margin: 15px 0; padding: 10px; border: 1px solid #00ff99; background: #1a2f23;">
                    <p style="margin: 0 0 10px 0;"><strong>问题2：</strong>如果还有机会，你愿意尝试多少次？</p>
                    <input type="number" id="q2-answer" min="1" max="100" value="20" style="width: 100px; background: #2c333e; color: #00ff99; border: 1px solid #00ff99; padding: 8px; font-size: 1em;"> 次
                </div>

                <button id="submit-questionnaire" style="padding: 10px 30px; background: #00ff99; color: #0d1117; border: none; cursor: pointer; font-weight: bold; font-size: 1em; margin-top: 10px;">提交并完成</button>
            </div>
        `;

        initSpeechRecognition();

        document.getElementById('submit-questionnaire').addEventListener('click', () => {
            const q1Answer = document.getElementById('q1-answer').value;
            const q2Answer = document.getElementById('q2-answer').value;
            exportFinalReportWithQuestions(q1Answer, q2Answer);

            feedbackMessage.innerHTML = `
                <div style="color: #00ff99; font-size: 1.2em; font-weight: bold; margin-top: 20px;">
                    <p>感谢您的参与！</p>
                    <p>完整报告（含问卷）已自动下载到您的电脑。</p>
                    <p style="color: #ffcc00; font-size: 0.9em; margin-top: 10px;">共尝试了 ${attemptCount} 次</p>
                </div>
            `;
        });
    }

    function initSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            document.getElementById('recording-status').textContent = '您的浏览器不支持语音识别，请手动输入';
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = true;
        recognition.interimResults = true;

        let finalTranscript = '';

        const startBtn = document.getElementById('start-record');
        const stopBtn = document.getElementById('stop-record');
        const status = document.getElementById('recording-status');
        const textarea = document.getElementById('q1-answer');

        startBtn.addEventListener('click', async () => {
            finalTranscript = textarea.value ? textarea.value + ' ' : '';

            startBtn.disabled = true;
            status.textContent = '⏳ 正在启动麦克风，请稍候...';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());

                await new Promise(resolve => setTimeout(resolve, 500));

                recognition.start();

                status.textContent = '⏳ 语音识别准备中，请等待...';
                await new Promise(resolve => setTimeout(resolve, 1500));

                startBtn.style.background = '#555';
                startBtn.style.cursor = 'not-allowed';
                stopBtn.disabled = false;
                stopBtn.style.background = '#ff5733';
                stopBtn.style.cursor = 'pointer';
                status.innerHTML = '🔴 <b>正在录音，请说话...</b>';

                textarea.placeholder = '录音已开始，请说出你的回答...';

            } catch (err) {
                status.textContent = '❌ 无法访问麦克风: ' + err.message;
                startBtn.disabled = false;
            }
        });

        stopBtn.addEventListener('click', () => {
            recognition.stop();
            startBtn.disabled = false;
            startBtn.style.background = '#ff5733';
            startBtn.style.cursor = 'pointer';
            stopBtn.disabled = true;
            stopBtn.style.background = '#555';
            stopBtn.style.cursor = 'not-allowed';
            status.textContent = '✓ 录音已停止';
        });

        recognition.onresult = (event) => {
            let interimTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscript += transcript;
                } else {
                    interimTranscript += transcript;
                }
            }

            textarea.value = finalTranscript + interimTranscript;
        };

        recognition.onerror = (event) => {
            status.textContent = '录音出错: ' + event.error;
            startBtn.disabled = false;
            startBtn.style.background = '#ff5733';
            stopBtn.disabled = true;
            stopBtn.style.background = '#555';
        };

        recognition.onend = () => {
            if (stopBtn.disabled === false) {
                recognition.start();
            }
        };
    }

    function exportFinalReportWithQuestions(q1, q2) {
        const gameEndTime = Date.now();
        const totalTimeSeconds = Math.floor((gameEndTime - gameStartTime) / 1000);
        const minutes = Math.floor(totalTimeSeconds / 60);
        const seconds = totalTimeSeconds % 60;

        const avgTime = attemptCount > 0 ? (totalTimeSeconds / attemptCount).toFixed(1) : 0;

        const report = {
            会话ID: SESSION_ID,
            游戏开始时间: new Date(gameStartTime).toLocaleString('zh-CN'),
            游戏结束时间: new Date(gameEndTime).toLocaleString('zh-CN'),
            总用时: `${minutes}分${seconds}秒`,
            总尝试次数: attemptCount,
            平均每次用时秒: avgTime,
            问卷答案: {
                问题1_策略反思: q1,
                问题2_愿意尝试次数: q2 + '次'
            },
            每次破解记录: sessionData
        };

        const dataStr = JSON.stringify(report, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = `密码破译报告_${SESSION_ID.slice(-6)}_${new Date().toLocaleDateString('zh-CN')}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        console.log('=== 最终报告（含问卷）已导出 ===', report);

        // 自动保存到云端 + 跳转下一个游戏
        saveCipherDecodeToCloud(report);
        if (window.GamePortal && !hasScheduledNextGameCipher) {
            hasScheduledNextGameCipher = true;
            window.GamePortal.scheduleNextGame('cipher-decode', { delayMs: 5000 });
        }
    }

    let hasScheduledNextGameCipher = false;
    let hasAutoUploadedCipher = false;

    function buildCipherMarkdown(report) {
        const lines = [
            '# 星际密码破译记录',
            '',
            `- 会话ID: ${report.会话ID}`,
            `- 游戏开始时间: ${report.游戏开始时间}`,
            `- 游戏结束时间: ${report.游戏结束时间}`,
            `- 总用时: ${report.总用时}`,
            `- 总尝试次数: ${report.总尝试次数}`,
            `- 平均每次用时秒: ${report.平均每次用时秒}`,
        ];
        if (report.问卷答案) {
            lines.push('', '## 问卷答案');
            lines.push(`- 问题1（策略反思）: ${report.问卷答案.问题1_策略反思 || '未填写'}`);
            lines.push(`- 问题2（愿意尝试次数）: ${report.问卷答案.问题2_愿意尝试次数 || '未填写'}`);
        }
        lines.push('', '## 每次破解记录');
        (report.每次破解记录 || []).forEach((rec) => {
            lines.push(`- 第${rec.attemptNumber}次：${rec.guess.join('')} → ${rec.result}（本次${rec.本次用时秒}秒 / 累计${rec.累计用时秒}秒；调整：${rec.本次调整}）`);
        });
        return lines.join('\n');
    }

    async function saveCipherDecodeToCloud(report) {
        if (!window.GamePortal) return;
        if (hasAutoUploadedCipher) return;
        try {
            await window.GamePortal.saveRecord({
                gameKey: 'cipher-decode',
                gameTitle: '星际密码破译',
                recordType: 'assessment',
                resultType: '密码破译完成',
                summary: `共 ${report.总尝试次数} 次尝试，总用时 ${report.总用时}`,
                recordMarkdown: buildCipherMarkdown(report),
                detailJson: report
            });
            hasAutoUploadedCipher = true;
            console.log('[云端] 密码破译记录已上传');
        } catch (err) {
            console.error('[云端] 保存失败：', err);
        }
    }

    // --- 事件监听器 ---
    submitButton.addEventListener('click', processAttempt);

    gameStartTime = Date.now();
    lastAttemptTime = Date.now();
    console.log('=== 星际密码破译 后台系统 ===');
    console.log('当前会话ID:', SESSION_ID);
    console.log('游戏开始时间:', new Date(gameStartTime).toLocaleString('zh-CN'));

    digitInputs.forEach(input => {
        input.addEventListener('input', (e) => {
            let val = parseInt(e.target.value);
            if (val < 1) e.target.value = 1;
            if (val > 9) e.target.value = 9;
        });
    });

    if (window.GamePortal) {
        window.GamePortal.renderGameStatus('#portal-game-status', { homeHref: './home.html' });
    }

</script>

</body>
</html>
