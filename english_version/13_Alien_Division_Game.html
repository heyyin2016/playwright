<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Exploration Academy: Crisis Commander</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #0aff0a;
            --neon-red: #ff3366;
            --neon-yellow: #ffee00;
            --bg-dark: #050b14;
            --glass: rgba(16, 33, 60, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image:
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: starMove 100s linear infinite;
        }

        @keyframes starMove {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 550px, 390px 410px, 380px 520px; }
        }

        .container {
            width: 90%;
            max-width: 800px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hologram-panel {
            background: var(--glass);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 20px rgba(0, 243, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            backdrop-filter: blur(5px);
            transition: all 0.5s ease;
            opacity: 0;
            transform: scale(0.95);
            animation: panelFadeIn 0.8s forwards;
        }

        .hologram-panel::-webkit-scrollbar {
            width: 6px;
        }

        .hologram-panel::-webkit-scrollbar-track {
            background: rgba(0, 243, 255, 0.1);
            border-radius: 3px;
        }

        .hologram-panel::-webkit-scrollbar-thumb {
            background: var(--neon-blue);
            border-radius: 3px;
        }

        @keyframes panelFadeIn {
            to { opacity: 1; transform: scale(1); }
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(0, 243, 255, 0.3);
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        h1, h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-top: 0;
            letter-spacing: 2px;
        }

        .story-text {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 20px;
            text-align: justify;
        }

        .highlight {
            color: var(--neon-purple);
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 20px;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            text-align: left;
            border-radius: 4px;
        }

        button:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-blue);
            transform: translateX(10px);
        }

        button::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--neon-blue);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:disabled:hover {
            transform: none;
            background: transparent;
        }

        button.selected {
            background: rgba(0, 243, 255, 0.3);
            border-color: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
        }

        button.selected::before {
            background: var(--neon-green);
        }

        .progress-bar {
            position: absolute;
            top: -20px;
            left: 0;
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
        }

        .progress-fill {
            height: 100%;
            background: var(--neon-green);
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--neon-green);
            border-radius: 2px;
        }

        .icon { font-size: 1.2em; margin-right: 10px; }

        /* Audio play button style */
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
        }

        .audio-btn {
            background: var(--neon-blue);
            color: var(--bg-dark);
            border: none;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s;
            min-width: auto;
            width: auto;
        }

        .audio-btn:hover {
            background: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
            transform: scale(1.05);
        }

        .audio-btn::before {
            display: none;
        }

        .audio-status {
            color: var(--neon-blue);
            font-size: 0.9rem;
        }

        .audio-status.playing {
            color: var(--neon-green);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Recording component style */
        .recording-section {
            margin-top: 25px;
            padding: 20px;
            background: rgba(188, 19, 254, 0.1);
            border: 1px solid var(--neon-purple);
            border-radius: 10px;
        }

        .recording-title {
            color: var(--neon-purple);
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recording-hint {
            color: #aaa;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .recording-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .record-btn {
            background: var(--neon-red);
            border-color: var(--neon-red);
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 30px;
            min-width: 140px;
            text-align: center;
        }

        .record-btn:hover {
            background: rgba(255, 51, 102, 0.3);
            box-shadow: 0 0 20px var(--neon-red);
        }

        .record-btn.recording {
            background: transparent;
            animation: recordPulse 1s infinite;
        }

        @keyframes recordPulse {
            0%, 100% { box-shadow: 0 0 10px var(--neon-red); }
            50% { box-shadow: 0 0 30px var(--neon-red), 0 0 50px var(--neon-red); }
        }

        .record-btn::before {
            display: none;
        }

        .recording-time {
            font-family: 'Orbitron', monospace;
            color: var(--neon-yellow);
            font-size: 1.2rem;
            min-width: 80px;
        }

        .transcript-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--neon-purple);
            border-radius: 8px;
            padding: 15px;
            min-height: 80px;
            max-height: 150px;
            overflow-y: auto;
            color: #ddd;
            font-size: 1rem;
            line-height: 1.6;
        }

        .transcript-box:empty::before {
            content: "Your speech will appear here in real-time...";
            color: #666;
            font-style: italic;
        }

        .transcript-box.listening {
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(10, 255, 10, 0.3);
        }

        .recording-status {
            color: var(--neon-green);
            font-size: 0.9rem;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .recording-status::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Dropdown select style */
        .select-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
        }

        .select-label {
            color: var(--neon-blue);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-blue);
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        select option {
            background: var(--bg-dark);
            color: white;
        }

        /* Text input style */
        .text-input-section {
            margin: 20px 0;
        }

        .text-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--neon-blue);
            color: white;
            border-radius: 4px;
            resize: vertical;
            min-height: 80px;
        }

        .text-input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* Role assignment display */
        .role-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .role-card {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .role-card.selected {
            background: rgba(0, 243, 255, 0.3);
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(10, 255, 10, 0.3);
        }

        .role-card .role-name {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .role-card .role-desc {
            font-size: 0.85rem;
            color: #aaa;
        }

        .role-card .assigned-to {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            color: var(--neon-yellow);
            font-weight: bold;
        }

        /* Result page style */
        .result-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .bar-container {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
        }

        .bar-label { width: 80px; text-align: right; margin-right: 10px; color: #aaa; }
        .bar-bg { flex-grow: 1; background: #333; height: 10px; border-radius: 5px; overflow: hidden; }
        .bar-val { height: 100%; background: var(--neon-purple); width: 0%; transition: width 1s ease-out; }

        /* Warning style */
        .warning-box {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid var(--neon-red);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            color: #ff99aa;
        }

        .warning-box strong {
            color: var(--neon-red);
        }

        /* Option group title */
        .option-group-title {
            color: var(--neon-yellow);
            font-weight: bold;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255, 238, 0, 0.3);
        }

        .next-btn-container {
            margin-top: 25px;
            text-align: center;
        }

        .next-btn {
            background: var(--neon-green);
            color: var(--bg-dark);
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px;
            min-width: 180px;
        }

        .next-btn:hover {
            background: var(--neon-blue);
            box-shadow: 0 0 30px var(--neon-blue);
            transform: scale(1.05);
        }

        .next-btn::before {
            display: none;
        }

        .next-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .next-btn:disabled:hover {
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hologram-panel" id="gamePanel">
            <div class="scan-line"></div>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

            <h2 id="title">Galaxy Exploration Academy - Mission Start</h2>

            <!-- Audio control area -->
            <div class="audio-controls" id="audioControls">
                <button class="audio-btn" id="audioBtn" onclick="toggleAudio()">▶ Play Audio</button>
                <span class="audio-status" id="audioStatus">Click to play scene audio</span>
            </div>

            <div id="content" class="story-text"></div>

            <!-- Dynamic content area -->
            <div id="dynamicContent"></div>

            <div id="options" class="btn-group"></div>

            <!-- Recording component area -->
            <div id="recordingSection" class="recording-section" style="display: none;">
                <div class="recording-title">🎙️ Voice Recording</div>
                <div class="recording-hint" id="recordingHint">Please explain why you made this choice...</div>
                <div class="recording-controls">
                    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">Start Recording</button>
                    <span class="recording-time" id="recordingTime">00:00</span>
                </div>
                <div class="transcript-box" id="transcriptBox"></div>
                <div class="recording-status" id="recordingStatus" style="display: none;">Listening...</div>
            </div>

            <!-- Next page button area -->
            <div class="next-btn-container" id="nextBtnContainer" style="display: none;">
                <button class="next-btn" id="nextBtn" onclick="nextStep()">Next Page →</button>
            </div>
        </div>
    </div>

    <script>
        // Game state
        let currentStep = 0;
        let scores = {
            leadership: 0,
            teamwork: 0,
            communication: 0,
            decision: 0,
            self_understanding: 0
        };
        let gameData = {
            step1Choice: null,
            step2Choice: null,
            selectedRole: null,
            roleAssignments: {},
            step4Choice: null,
            step5Choice: null,
            transcripts: {}
        };

        // Audio related
        let currentAudio = null;
        let isAudioPlaying = false;

        // Recording related
        let mediaRecorder = null;
        let recognition = null;
        let isRecording = false;
        let recordingStartTime = null;
        let recordingTimer = null;
        let audioChunks = [];
        let currentTranscript = "";
        let countdownTimer = null;

        // Initialize speech recognition
        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';

                recognition.onresult = (event) => {
                    let finalTranscript = '';
                    let interimTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript;
                        } else {
                            interimTranscript += transcript;
                        }
                    }

                    if (finalTranscript) {
                        currentTranscript += finalTranscript;
                    }

                    updateTranscriptDisplay(interimTranscript);
                };

                recognition.onerror = (event) => {
                    console.error('Speech recognition error:', event.error);
                };
            }
        }

        function updateTranscriptDisplay(interimText) {
            const box = document.getElementById('transcriptBox');
            box.innerHTML = currentTranscript +
                (interimText ? `<span style="color:#888;">${interimText}</span>` : '');
            box.scrollTop = box.scrollHeight;
        }

        // Toggle recording
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        // Audio context and audio processing nodes
        let audioContext = null;
        let audioInput = null;
        let scriptProcessor = null;
        let preRecordingBuffer = []; // Pre-recording buffer


        async function startRecording() {
            try {
                // First get microphone permission
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // Start MediaRecorder
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.start(50);

                // Start speech recognition
                if (recognition) {
                    currentTranscript = "";
                    document.getElementById('transcriptBox').innerHTML = "";
                    try {
                        recognition.start();
                    } catch (e) {
                        console.log('Speech recognition startup failed:', e);
                    }
                }

                isRecording = true;

                // Show countdown, let user wait 3 seconds
                document.getElementById('recordBtn').textContent = "Preparing...";
                document.getElementById('recordBtn').disabled = true;
                document.getElementById('transcriptBox').innerHTML = "<span style='color: var(--neon-yellow); font-size: 1.2rem;'>⏳ Please wait 3 seconds before speaking...</span>";
                document.getElementById('transcriptBox').classList.add('listening');

                recordingCountdown = 3;
                countdownTimer = setInterval(() => {
                    recordingCountdown--;
                    if (recordingCountdown > 0) {
                        document.getElementById('transcriptBox').innerHTML = `<span style='color: var(--neon-yellow); font-size: 1.2rem;'>⏳ Please wait ${recordingCountdown} seconds before speaking...</span>`;
                    } else {
                        clearInterval(countdownTimer);
                        // Countdown ended, start formal recording
                        recordingStartTime = Date.now();
                        document.getElementById('recordBtn').textContent = "Stop Recording";
                        document.getElementById('recordBtn').disabled = false;
                        document.getElementById('recordBtn').classList.add('recording');
                        document.getElementById('transcriptBox').innerHTML = "<span style='color: var(--neon-green);'>🎙️ You can start speaking now!</span>";
                        document.getElementById('recordingStatus').style.display = 'flex';
                        recordingTimer = setInterval(updateRecordingTime, 1000);
                    }
                }, 1000);

            } catch (err) {
                alert('Unable to access microphone. Please ensure recording permission is granted.');
                console.error('Recording error:', err);
            }
        }

        function stopRecording() {
            // Clear countdown timer (if still counting down)
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }

            if (recognition) {
                recognition.stop();
            }

            isRecording = false;
            clearInterval(recordingTimer);

            document.getElementById('recordBtn').textContent = "Start Recording";
            document.getElementById('recordBtn').disabled = false;
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('transcriptBox').classList.remove('listening');
            document.getElementById('recordingStatus').style.display = 'none';

            // Save recording content
            gameData.transcripts[currentStep] = currentTranscript;

            // Check if can proceed to next page
            checkCanProceed();
        }

        function updateRecordingTime() {
            const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('recordingTime').textContent = `${minutes}:${seconds}`;
        }

        // Audio playback function
        function toggleAudio() {
            if (isAudioPlaying) {
                pauseAudio();
            } else {
                playAudio();
            }
        }

        function playAudio() {
            // Audio file paths - using m4a files from music folder
            const audioFiles = {
                0: "music/captain1.m4a",
                1: "music/captain2.m4a",
                2: "music/captain3.m4a",
                3: "music/captain4.m4a",
                4: "music/captain5.m4a"
            };

            // If audio is currently playing, stop it first
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            // Create new audio object
            currentAudio = new Audio(audioFiles[currentStep]);

            currentAudio.onplay = () => {
                isAudioPlaying = true;
                document.getElementById('audioBtn').textContent = "⏸ Pause Audio";
                document.getElementById('audioStatus').textContent = "Playing...";
                document.getElementById('audioStatus').classList.add('playing');
            };

            currentAudio.onended = () => {
                isAudioPlaying = false;
                document.getElementById('audioBtn').textContent = "▶ Play Audio";
                document.getElementById('audioStatus').textContent = "Playback complete";
                document.getElementById('audioStatus').classList.remove('playing');
            };

            currentAudio.onerror = () => {
                console.error('Audio load failed:', audioFiles[currentStep]);
                document.getElementById('audioStatus').textContent = "Audio load failed";
                isAudioPlaying = false;
            };

            currentAudio.play().catch(err => {
                console.error('Audio playback failed:', err);
                document.getElementById('audioStatus').textContent = "Click to play scene audio";
                isAudioPlaying = false;
            });
        }

        function pauseAudio() {
            if (currentAudio) {
                currentAudio.pause();
            }
            isAudioPlaying = false;
            document.getElementById('audioBtn').textContent = "▶ Play Audio";
            document.getElementById('audioStatus').textContent = "Click to play scene audio";
            document.getElementById('audioStatus').classList.remove('playing');
        }

        // Game script data
        const scenarios = [
            {
                title: "⚠️ Emergency Alert: Hull Damaged",
                audioFile: "scene1_alert.mp3",
                text: `You have been selected for the <span class="highlight">Galaxy Exploration Academy</span>. At this moment, the spaceship has been hit by a meteor shower. The captain is unreachable, and the oxygen system is damaged.
                <br><br>You have two alien companions beside you:
                <br>👽 <b>Lulu</b>: Thoughtful and meticulous, but easily nervous.
                <br>🤖 <b>Bobo</b>: Tech geek, but stubborn.
                <br><br>The mission is urgent. Someone must step up to take command now, or follow orders. What do you prefer:`,
                hasOptions: true,
                options: [
                    {
                        text: "I am a natural commander. I will be the temporary captain.",
                        score: { leadership: 2, self_understanding: 1 }
                    },
                    {
                        text: "I prefer to cooperate with everyone and be an efficient team member.",
                        score: { teamwork: 2, leadership: 0 }
                    }
                ],
                recordingHint: "Why did you make this choice? Please share your thoughts...",
                requireRecording: true
            },
            {
                title: "🌟 Role Confirmation",
                audioFile: "scene2_role.mp3",
                text: `After a brief exchange of glances, Lulu and Bobo unanimously elected you as the <b>temporary captain</b>.
                <br>In this emergency, why do you think they voted for you?`,
                hasOptions: true,
                options: [
                    {
                        text: "Because I have the ability, and I believe I am better than them.",
                        score: { self_understanding: 2, leadership: 1 }
                    },
                    {
                        text: "Because I am usually good at listening, and everyone trusts me.",
                        score: { communication: 2, teamwork: 1 }
                    },
                    {
                        text: "Because I am usually very organized and can coordinate everyone.",
                        score: { leadership: 2, decision: 1 }
                    },
                    {
                        text: "I don't know why they chose me.",
                        score: { self_understanding: -1, teamwork: 1 }
                    }
                ],
                recordingHint: "What do you think being chosen as captain means? Are you ready?",
                requireRecording: true
            },
            {
                title: "⚙️ Emergency Division of Labor",
                audioFile: "scene3_division.mp3",
                text: `The spaceship is severely damaged. Three modules must be repaired simultaneously for takeoff:
                <br><br>⚙️ <b>A. Power Circuits</b> (Tedious, requires extreme patience)
                <br>🔧 <b>B. Hull Reinforcement</b> (High-pressure, physical labor, heavy responsibility)
                <br>🧭 <b>C. Navigation Calibration</b> (Brain-intensive, determines life-or-death direction)
                <br><br><b>As the captain, you need to assign roles.</b>`,
                hasRoleSelection: true,
                recordingHint: "Explain why you chose this role, and your arrangements for the other two companions and your reasons...",
                requireRecording: true
            },
            {
                title: "🔥 High-Risk Operation",
                audioFile: "scene4_crisis.mp3",
                text: `During the repair process, an unexpected issue is discovered: the core component is in a high-temperature zone.
                <br>This is extra dirty and dangerous work, with a slight risk of burns.
                <br>Both Lulu and Bobo are hesitant and reluctant to take it. Time is ticking away...
                <br><br><b>What will you do?</b>`,
                hasInnerThought: true,
                recordingHint: "Talk about why you chose this approach and what you were thinking at the time...",
                requireRecording: true
            },
            {
                title: "🐢 Team Member Falling Behind",
                audioFile: "scene5_team.mp3",
                text: `Lulu's circuit repair is progressing very slowly. She keeps making mistakes due to shaky hands.
                <br>The countdown is down to 10 minutes. If she doesn't finish, everyone is doomed.
                <br><br><b>You take a deep breath and start handling this crisis. What do you plan to do?</b>`,
                hasOptions: true,
                options: [
                    {
                        text: "Encourage Lulu and believe she can do it",
                        score: { communication: 2, teamwork: 2 }
                    },
                    {
                        text: "Help her personally",
                        score: { leadership: 2, teamwork: 1 }
                    },
                    {
                        text: "Have Bobo assist Lulu",
                        score: { decision: 2, leadership: 1 }
                    }
                ],
                recordingHint: "Why did you choose this approach? What specifically would you do?",
                requireRecording: true
            }
        ];

        // Render current step
        function renderStep() {
            const panel = document.getElementById('gamePanel');
            const title = document.getElementById('title');
            const content = document.getElementById('content');
            const optionsDiv = document.getElementById('options');
            const dynamicContent = document.getElementById('dynamicContent');
            const progressBar = document.getElementById('progress');
            const recordingSection = document.getElementById('recordingSection');
            const nextBtnContainer = document.getElementById('nextBtnContainer');

            // Reset state
            currentTranscript = "";
            if (gameData.transcripts[currentStep]) {
                currentTranscript = gameData.transcripts[currentStep];
            }
            document.getElementById('transcriptBox').innerHTML = currentTranscript || "";
            document.getElementById('recordingTime').textContent = "00:00";

            // Progress bar
            const progressPercent = ((currentStep) / scenarios.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            // Animation reset
            panel.style.animation = 'none';
            panel.offsetHeight;
            panel.style.animation = 'panelFadeIn 0.5s forwards';

            // Check game end
            if (currentStep >= scenarios.length) {
                showResult();
                return;
            }

            const scene = scenarios[currentStep];

            // Title
            title.innerHTML = scene.title;

            // Text
            content.innerHTML = scene.text;

            // Clear dynamic content
            dynamicContent.innerHTML = "";
            optionsDiv.innerHTML = "";

            // Recording area setup
            if (scene.requireRecording) {
                recordingSection.style.display = 'block';
                document.getElementById('recordingHint').textContent = scene.recordingHint;
            } else {
                recordingSection.style.display = 'none';
            }

            // Auto-play audio
            setTimeout(() => {
                playAudio();
            }, 500);

            // Render different content based on scene type
            if (scene.hasRoleSelection) {
                renderRoleSelection(dynamicContent, optionsDiv);
                nextBtnContainer.style.display = 'none';
            } else if (scene.hasInnerThought) {
                renderInnerThought(dynamicContent, optionsDiv);
                nextBtnContainer.style.display = 'none';
            } else if (scene.hasOptions) {
                renderOptions(scene.options, optionsDiv);
                nextBtnContainer.style.display = 'none';
            } else {
                nextBtnContainer.style.display = 'block';
                document.getElementById('nextBtn').disabled = false;
            }

            checkCanProceed();
        }

        // Render options
        function renderOptions(options, container) {
            options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.innerHTML = `<span class="icon">➤</span> ${opt.text}`;
                btn.dataset.index = index;
                btn.onclick = () => selectOption(opt, index, btn);
                container.appendChild(btn);
            });
        }

        // Select option
        function selectOption(option, index, btnElement) {
            // Remove other selected states
            const allBtns = btnElement.parentElement.querySelectorAll('button');
            allBtns.forEach(b => b.classList.remove('selected'));

            // Add selected state
            btnElement.classList.add('selected');

            // Save choice
            if (currentStep === 0) {
                gameData.step1Choice = option;
            } else if (currentStep === 1) {
                gameData.step2Choice = option;
            } else if (currentStep === 4) {
                gameData.step5Choice = option;
            }

            // Score
            for (let key in option.score) {
                if (scores.hasOwnProperty(key)) {
                    scores[key] += option.score[key];
                }
            }

            // Show recording area (if not already shown)
            const scene = scenarios[currentStep];
            if (scene.requireRecording) {
                document.getElementById('recordingSection').style.display = 'block';
            }

            // Immediately show and enable next page button (recording not mandatory)
            document.getElementById('nextBtnContainer').style.display = 'block';
            document.getElementById('nextBtn').disabled = false;
        }

        // Render role selection
        function renderRoleSelection(dynamicContent, optionsDiv) {
            // Hint text
            const hintText = document.createElement('div');
            hintText.style.marginBottom = '15px';
            hintText.style.color = '#aaa';
            hintText.innerHTML = `<i>Click to select the role you want to play:</i>`;
            dynamicContent.appendChild(hintText);

            // Role card display (clickable selection)
            const roleDisplay = document.createElement('div');
            roleDisplay.className = 'role-display';
            roleDisplay.id = 'roleDisplay';
            roleDisplay.innerHTML = `
                <div class="role-card" id="roleA" onclick="selectRole('A')">
                    <div class="role-name">⚙️ A</div>
                    <div class="role-desc">Power Circuits<br>Tedious, requires patience</div>
                    <div class="assigned-to" id="assignA">?</div>
                </div>
                <div class="role-card" id="roleB" onclick="selectRole('B')">
                    <div class="role-name">🔧 B</div>
                    <div class="role-desc">Hull Reinforcement<br>High-pressure, physical</div>
                    <div class="assigned-to" id="assignB">?</div>
                </div>
                <div class="role-card" id="roleC" onclick="selectRole('C')">
                    <div class="role-name">🧭 C</div>
                    <div class="role-desc">Navigation Calibration<br>Brain-intensive, critical</div>
                    <div class="assigned-to" id="assignC">?</div>
                </div>
            `;
            dynamicContent.appendChild(roleDisplay);
        }

        // Select role
        function selectRole(role) {
            if (!role) return;

            gameData.selectedRole = role;

            // Update role card display
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.getElementById(`role${role}`).classList.add('selected');

            // Assign roles
            let assignments = {};
            if (role === 'A') {
                assignments = { A: 'You', B: 'Bobo', C: 'Lulu' };
            } else if (role === 'B') {
                assignments = { A: 'Lulu', B: 'You', C: 'Bobo' };
            } else if (role === 'C') {
                assignments = { A: 'Lulu', B: 'Bobo', C: 'You' };
            }

            gameData.roleAssignments = assignments;

            document.getElementById('assignA').textContent = assignments.A;
            document.getElementById('assignB').textContent = assignments.B;
            document.getElementById('assignC').textContent = assignments.C;

            // Show recording area
            document.getElementById('recordingSection').style.display = 'block';

            // Show next page button
            document.getElementById('nextBtnContainer').style.display = 'block';
            document.getElementById('nextBtn').disabled = false;
        }

        // Render inner thought selection (high-risk operation scene)
        function renderInnerThought(dynamicContent, optionsDiv) {
            // Inner thought description
            const thoughtText = document.createElement('div');
            thoughtText.style.marginBottom = '15px';
            thoughtText.style.color = '#aaa';
            thoughtText.innerHTML = `<i>At this moment, various thoughts flash through your mind...</i>`;
            dynamicContent.appendChild(thoughtText);

            // Option group 1: First reaction
            const group1Title = document.createElement('div');
            group1Title.className = 'option-group-title';
            group1Title.textContent = "Your first reaction is:";
            optionsDiv.appendChild(group1Title);

            const thoughts1 = [
                {
                    id: 'thought1_a',
                    text: "This is painful. Why did I get into this situation? Why won't either of them do it?",
                    type: 'feeling'
                },
                {
                    id: 'thought1_b',
                    text: "This is a great opportunity. I think I can prove myself!",
                    type: 'feeling'
                },
                {
                    id: 'thought1_c',
                    text: "Calm down. This isn't the time for these thoughts. I need to solve the problem.",
                    type: 'feeling'
                }
            ];

            thoughts1.forEach(thought => {
                const btn = document.createElement('button');
                btn.innerHTML = `<span class="icon">💭</span> ${thought.text}`;
                btn.dataset.type = 'thought1';
                btn.dataset.id = thought.id;
                btn.onclick = () => selectThought(btn, 'thought1');
                optionsDiv.appendChild(btn);
            });

            // Option group 2: Final decision
            const group2Title = document.createElement('div');
            group2Title.className = 'option-group-title';
            group2Title.textContent = "In the end, you decide:";
            optionsDiv.appendChild(group2Title);

            const thoughts2 = [
                {
                    id: 'thought2_a',
                    text: "Well, I'll just have to do it myself.",
                    score: { leadership: 2, decision: 1 }
                },
                {
                    id: 'thought2_b',
                    text: "No, I must get them involved too.",
                    score: { teamwork: 2, communication: 1 }
                },
                {
                    id: 'thought2_c',
                    text: "Find a compromise - take turns.",
                    score: { decision: 2, teamwork: 1 }
                }
            ];

            thoughts2.forEach(thought => {
                const btn = document.createElement('button');
                btn.innerHTML = `<span class="icon">⚡</span> ${thought.text}`;
                btn.dataset.type = 'thought2';
                btn.dataset.id = thought.id;
                btn.dataset.score = JSON.stringify(thought.score);
                btn.onclick = () => selectThought(btn, 'thought2');
                optionsDiv.appendChild(btn);
            });
        }

        // Select inner thought
        function selectThought(btn, type) {
            // Remove selected state from same group
            const groupBtns = document.querySelectorAll(`[data-type="${type}"]`);
            groupBtns.forEach(b => b.classList.remove('selected'));

            // Add selected state
            btn.classList.add('selected');

            // Save choice
            if (type === 'thought1') {
                gameData.step4Choice = { ...gameData.step4Choice, thought1: btn.dataset.id };
            } else {
                gameData.step4Choice = { ...gameData.step4Choice, thought2: btn.dataset.id };
                // Score
                const score = JSON.parse(btn.dataset.score);
                for (let key in score) {
                    if (scores.hasOwnProperty(key)) {
                        scores[key] += score[key];
                    }
                }
            }

            // Check if can proceed to next page
            const thought1Selected = document.querySelector('[data-type="thought1"].selected');
            const thought2Selected = document.querySelector('[data-type="thought2"].selected');
            if (thought1Selected && thought2Selected) {
                document.getElementById('nextBtnContainer').style.display = 'block';
                document.getElementById('nextBtn').disabled = false;
            }
        }

        // Check if can proceed to next page (simplified version, recording not mandatory)
        function checkCanProceed() {
            // This function is mainly used for initialization state
            // Actual feasibility check is handled during selection
        }

        // Proceed to next step
        function nextStep() {
            // Save current page text input (if any)
            if (currentStep === 2) {
                const arrangementText = document.getElementById('arrangementText');
                if (arrangementText) {
                    gameData.arrangementText = arrangementText.value;
                }
            }

            currentStep++;
            renderStep();
        }

        // Show result
        function showResult() {
            const content = document.getElementById('content');
            const optionsDiv = document.getElementById('options');
            const title = document.getElementById('title');
            const recordingSection = document.getElementById('recordingSection');
            const audioControls = document.getElementById('audioControls');
            const nextBtnContainer = document.getElementById('nextBtnContainer');

            // Hide unnecessary elements
            recordingSection.style.display = 'none';
            audioControls.style.display = 'none';
            nextBtnContainer.style.display = 'none';

            document.getElementById('progress').style.width = '100%';

            title.innerHTML = "🚀 Mission Complete: Commander Assessment Report";

            // Calculate score
            const maxScore = 12;

            let html = `<p>The spaceship has successfully taken off! The Galaxy Exploration Academy has generated your leadership radar chart based on your performance during the crisis:</p>`;
            html += `<div class="result-chart">`;

            const dimensions = [
                { key: 'leadership', label: 'Leadership' },
                { key: 'decision', label: 'Decision' },
                { key: 'communication', label: 'Communication' },
                { key: 'teamwork', label: 'Teamwork' },
                { key: 'self_understanding', label: 'Self-Awareness' }
            ];

            dimensions.forEach(dim => {
                let val = Math.max(0, scores[dim.key]);
                let width = Math.min(100, Math.max(10, (val / maxScore) * 100 + 20));

                html += `
                <div class="bar-container">
                    <div class="bar-label">${dim.label}</div>
                    <div class="bar-bg">
                        <div class="bar-val" style="width: ${width}%"></div>
                    </div>
                </div>`;
            });
            html += `</div>`;

            html += `<br><p><i>"True leaders are not those who never fear, but those who move forward despite their fear."</i></p>`;

            // Show user's choice summary
            html += `<div style="margin-top: 30px; padding: 15px; background: rgba(0,243,255,0.1); border-radius: 8px;">`;
            html += `<h3 style="color: var(--neon-blue); margin-top: 0;">📋 Your Decision Log</h3>`;

            if (gameData.step1Choice) {
                html += `<p><b>Scene 1:</b> ${gameData.step1Choice.text}</p>`;
            }
            if (gameData.step2Choice) {
                html += `<p><b>Scene 2:</b> ${gameData.step2Choice.text}</p>`;
            }
            if (gameData.selectedRole) {
                html += `<p><b>Role Assignment:</b> You chose to play Role ${gameData.selectedRole}</p>`;
            }
            if (gameData.step4Choice) {
                html += `<p><b>High-Risk Operation:</b> First reaction: ${gameData.step4Choice.thought1 || ''} / Final decision: ${gameData.step4Choice.thought2 || ''}</p>`;
            }
            if (gameData.step5Choice) {
                html += `<p><b>Team Member Falling Behind:</b> ${gameData.step5Choice.text}</p>`;
            }

            html += `</div>`;

            content.innerHTML = html;

            // Replay button
            optionsDiv.innerHTML = '';
            const btn = document.createElement('button');
            btn.innerHTML = "↺ Restart Simulation";
            btn.style.textAlign = 'center';
            btn.onclick = () => location.reload();
            optionsDiv.appendChild(btn);
        }

        // Initialize
        initSpeechRecognition();
        renderStep();
    </script>
</body>
</html>
