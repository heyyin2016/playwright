<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际探索者 · 兴趣宇宙大冒险</title>
    <link rel="stylesheet" href="../shared/game-portal.css">
    <style>
        .portal-game-status {
            border: 1px solid rgba(0, 224, 255, 0.45);
            background: rgba(11, 15, 25, 0.92);
            color: #d8f4ff;
            box-shadow: 0 0 22px rgba(0, 224, 255, 0.18);
            margin-top: 18px;
        }
        .portal-home-link { color: #00e0ff; text-shadow: 0 0 8px rgba(0,224,255,0.35); }
        :root {
            --bg-deep: #0b0f19;
            --card-bg: #151a28;
            --accent-blue: #00e0ff;
            --accent-gold: #ffd700;
            --text-main: #eef5ff;
            --text-dim: #8899b3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 50% 0, #1a2540 0%, #0b0f19 80%);
        }

        .container {
            max-width: 1100px;
            width: 100%;
            padding-bottom: 120px; /* 为底部控制栏留空间 */
        }

        h1 {
            text-align: center;
            font-size: 2.8em;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 15px rgba(0, 224, 255, 0.4));
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 1.1em;
            border-bottom: 1px dashed #335;
            padding-bottom: 20px;
        }

        /* --- 步骤 1: 星球大厅 --- */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .theme-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .theme-card:hover {
            transform: translateY(-8px);
            border-color: var(--glow-color, var(--accent-blue));
            box-shadow: 0 15px 30px var(--shadow-color, rgba(0, 242, 255, 0.15));
        }

        .theme-icon-bg {
            width: 85px; height: 85px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex; justify-content: center; align-items: center;
            font-size: 3.5em;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            filter: drop-shadow(0 0 10px currentColor);
        }

        .theme-title {
            font-size: 1.6em;
            font-weight: bold;
            margin-bottom: 12px;
        }
        
        .theme-desc {
            font-size: 0.95em;
            color: var(--text-dim);
            line-height: 1.5;
        }

        /* --- 步骤 2: 任务选择 --- */
        #career-section { display: none; width: 100%; animation: slideUp 0.4s ease-out; }
        
        .top-back-btn {
            background: rgba(255,255,255,0.05); border: 1px solid #334; color: var(--text-dim);
            cursor: pointer; font-size: 1em; margin-bottom: 20px;
            display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 30px;
            transition: 0.2s;
        }
        .top-back-btn:hover { color: #fff; background: rgba(255,255,255,0.1); border-color: #556; }

        .planet-header-title {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 2.2em;
            font-weight: 600;
            margin-bottom: 25px;
            border-bottom: 2px solid #2e3e5a;
            padding-bottom: 15px;
        }

        .career-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .career-card {
            background: #1a2335;
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 0 #0f1420;
        }

        .career-card:hover {
            background: #202b42;
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #0f1420;
        }

        .career-card.selected {
            border-color: var(--accent-gold);
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2), 0 5px 0 #998100;
            transform: translateY(3px);
        }

        .job-visual {
            height: 90px;
            width: 90px;
            background: #111827;
            border-radius: 50%;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3em;
            border: 1px solid #2d3748;
        }
        
        .job-title {
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 1.1em;
            line-height: 1.4;
        }
        
        .job-earth {
            font-size: 0.85em;
            color: #7a8b9e;
            background: #0f1420;
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: auto;
        }

        /* 馆内底部的“回大厅”按钮 */
        .hall-back-btn {
            display: block;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            padding: 16px;
            background: #2c3855;
            border: 1px solid #5f73a0;
            color: #fff;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: 0.3s;
        }
        .hall-back-btn:hover { background: #3b4a70; }

        /* --- 底部全局控制栏 --- */
        .control-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10, 15, 30, 0.85);
            border-top: 1px solid #2f3b5c;
            padding: 15px 30px;
            display: flex; justify-content: center; align-items: center; gap: 30px;
            backdrop-filter: blur(10px);
            z-index: 90;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
        }

        .status-text { font-size: 1.2em; color: var(--accent-blue); font-weight: bold; }
        
        .finish-btn {
            background: var(--accent-gold); color: #0a0c14;
            border: none; padding: 12px 35px; border-radius: 40px;
            font-weight: bold; cursor: pointer; font-size: 1.2em;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: 0.2s;
            letter-spacing: 1px;
        }
        .finish-btn:hover { transform: scale(1.05); background: #ffe68f; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 喇叭按钮样式 --- */
        .page-header { position: relative; display: flex; align-items: center; justify-content: center; }
        .page-header h1, .page-header h2 { margin: 0; flex-grow: 1; }

        .sound-btn {
            background: linear-gradient(135deg, #00e0ff 0%, #0080ff 100%);
            border: none; width: 44px; height: 44px; border-radius: 50%;
            cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 224, 255, 0.4);
            transition: all 0.3s ease; opacity: 0.9; margin-left: 15px;
        }
        .sound-btn:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(0, 224, 255, 0.6); opacity: 1; }
        .sound-btn:active { transform: scale(0.95); }
        .sound-icon { width: 24px; height: 24px; fill: white; transition: all 0.3s ease; }

        /* 播放时的声波动画 */
        .sound-waves { position: absolute; display: flex; align-items: center; gap: 2px; opacity: 0; transition: opacity 0.3s ease; margin-left: 28px; }
        .sound-btn.playing .sound-waves { opacity: 1; }
        .sound-wave { width: 3px; height: 8px; background: white; border-radius: 2px; animation: soundWave 0.5s ease-in-out infinite; }
        .sound-wave:nth-child(1) { animation-delay: 0s; }
        .sound-wave:nth-child(2) { animation-delay: 0.1s; height: 12px; }
        .sound-wave:nth-child(3) { animation-delay: 0.2s; height: 16px; }
        @keyframes soundWave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.5); } }

        /* 播放状态时的脉冲动画 */
        .sound-btn.playing .sound-icon { animation: speakerPulse 1s ease-in-out infinite; }
        @keyframes speakerPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .sound-btn.paused .sound-icon { opacity: 0.7; }

        audio { display: none; }

        /* --- 结果弹窗 --- */
        #result-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 4, 15, 0.95); z-index: 100;
            backdrop-filter: blur(8px);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #141e30; padding: 40px; border-radius: 32px;
            border: 2px solid var(--accent-gold); text-align: center; max-width: 650px;
            width: 90%;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
        }
        
        .top-three-box {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 25px 0;
        }
        .top-badge {
            background: linear-gradient(145deg, #2c3e62, #1b2540);
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1.4em;
            font-weight: bold;
            border: 2px solid gold;
            color: #fff;
        }

        .advice-box {
            background: #0d1628; border-radius: 20px; padding: 25px;
            margin: 20px 0 30px; text-align: left;
            line-height: 1.6; color: #baccf0; font-size: 1.05em;
        }

        .restart-btn {
            background: transparent; border: 2px solid var(--accent-blue); color: var(--accent-blue);
            padding: 10px 30px; border-radius: 30px; font-size: 1.1em; cursor: pointer;
            transition: 0.2s; font-weight: bold;
        }
        .restart-btn:hover { background: var(--accent-blue); color: #000; }

        /* --- 录音弹窗样式 --- */
        #record-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 4, 15, 0.95); z-index: 200;
            backdrop-filter: blur(8px);
            justify-content: center; align-items: center;
        }
        .record-modal-content {
            background: linear-gradient(145deg, #1a2540, #0f1623);
            padding: 40px; border-radius: 32px;
            border: 2px solid var(--accent-blue); text-align: center;
            max-width: 500px; width: 90%;
            box-shadow: 0 0 50px rgba(0, 224, 255, 0.3);
            animation: slideUp 0.4s ease-out;
        }
        .record-modal-title {
            font-size: 1.8em; color: var(--accent-gold);
            margin-bottom: 10px;
        }
        .record-modal-subtitle {
            color: var(--text-dim); margin-bottom: 25px;
            font-size: 1.1em;
        }
        .record-task-display {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px; padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .record-task-emoji { font-size: 3em; margin-bottom: 10px; }
        .record-task-name { font-size: 1.3em; color: var(--text-main); margin-bottom: 5px; }
        .record-task-earth { color: var(--text-dim); font-size: 0.9em; }
        .record-question {
            font-size: 1.2em; color: var(--accent-blue);
            margin-bottom: 20px; padding: 15px;
            background: rgba(0, 224, 255, 0.1);
            border-radius: 12px;
            border-left: 4px solid var(--accent-blue);
        }
        .record-textarea {
            width: 100%; min-height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #334; border-radius: 12px;
            padding: 15px; color: var(--text-main);
            font-size: 1em; resize: vertical;
            box-sizing: border-box; margin-bottom: 15px;
        }
        .record-textarea:focus {
            outline: none; border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
        }
        .record-textarea::placeholder { color: #556; }
        .voice-input-controls {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin-bottom: 20px;
        }
        .voice-input-btn {
            background: linear-gradient(135deg, #00e0ff 0%, #0080ff 100%);
            border: none; color: #fff; border-radius: 30px;
            padding: 12px 24px; font-size: 1em; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 224, 255, 0.4);
            transition: all 0.3s ease;
        }
        .voice-input-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 224, 255, 0.6);
        }
        .voice-input-btn:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }
        .voice-input-btn.recording {
            background: linear-gradient(135deg, #ff4d4d 0%, #e74c3c 100%);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            50% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
        }
        .voice-status {
            color: var(--text-dim); font-size: 0.9em;
            min-height: 20px;
        }
        .voice-error {
            color: #ff6b6b; font-size: 0.85em;
            min-height: 20px;
        }
        .record-modal-buttons {
            display: flex; gap: 15px; justify-content: center;
        }
        .record-save-btn {
            background: var(--accent-gold); color: #0a0c14;
            border: none; padding: 12px 30px; border-radius: 30px;
            font-weight: bold; cursor: pointer; font-size: 1em;
            transition: all 0.2s;
        }
        .record-save-btn:hover { transform: scale(1.05); background: #ffe68f; }
        .record-skip-btn {
            background: transparent; border: 2px solid #556;
            color: #889; padding: 12px 30px; border-radius: 30px;
            font-weight: bold; cursor: pointer; font-size: 1em;
            transition: all 0.2s;
        }
        .record-skip-btn:hover { border-color: #889; color: #aab; }

    </style>
    <script src="../shared/i18n.js"></script>
    <script src="./i18n-dict.js"></script>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🪐 星际探索者</h1>
        <button class="sound-btn" id="main-sound-btn" onclick="playAudio('main')" title="播放语音">
            <svg class="sound-icon" viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <div class="sound-waves">
                <div class="sound-wave"></div>
                <div class="sound-wave"></div>
                <div class="sound-wave"></div>
            </div>
        </button>
    </div>
    <p class="subtitle" id="main-subtitle">欢迎来到兴趣宇宙！请自由参观 6 大维度星球，点亮你感兴趣的星际任务。</p>

    <div id="theme-gallery" class="theme-grid"></div>

    <div id="career-section">
        <button class="top-back-btn" onclick="goBack()">⬅ 返回星际地图</button>
        <div class="planet-header-title" id="current-theme-title"></div>
        <div class="page-header" style="justify-content: flex-start; margin-bottom: 20px;">
            <button class="sound-btn" id="planet-sound-btn" onclick="playPlanetAudio()" title="播放语音">
                <svg class="sound-icon" viewBox="0 0 24 24">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
                <div class="sound-waves">
                    <div class="sound-wave"></div>
                    <div class="sound-wave"></div>
                    <div class="sound-wave"></div>
                </div>
            </button>
        </div>

        <div class="career-grid" id="career-container"></div>

        <button class="hall-back-btn" onclick="goBack()">🏠 完成本星球探索 · 回地图</button>
    </div>
</div>

<div class="control-bar" id="control-bar">
    <div class="status-text" id="status-text">已点亮 0 个探索任务</div>
    <button class="finish-btn" id="finish-btn" onclick="showResult()" style="display: none;">生成兴趣报告 🚀</button>
</div>

<div id="result-modal">
    <div class="modal-content">
        <h2 style="color:var(--accent-gold); font-size: 2.2em; margin-bottom: 10px;">🧬 兴趣宇宙 · 探索报告</h2>
        <p style="color: #8899b3;">根据你的选择，解码出你最感兴趣的维度：</p>

        <div class="top-three-box" id="topThreeList"></div>

        <div class="advice-box" id="interestAdvice"></div>

        <div class="portal-cloud-panel" style="margin-top:18px;">
            <h3>云端记录</h3>
            <p>完成探索后会自动上传到云端；你也可以手动点击按钮再次上传。</p>
            <button class="portal-cloud-save-btn" type="button" onclick="saveResultToCloud()">☁️ 保存到云端</button>
            <button class="portal-cloud-save-btn" type="button" onclick="goToNextGame()" style="margin-top:10px;">➡️ 前往下一个游戏</button>
            <p id="cloud-save-status" class="portal-cloud-status"></p>
        </div>
    </div>
</div>

<!-- 录音弹窗 -->
<div id="record-modal">
    <div class="record-modal-content">
        <div class="record-modal-title">🎤 分享你的想法</div>
        <div class="record-modal-subtitle">分享你过去的相关经历</div>

        <div class="record-task-display" id="record-task-display">
            <div class="record-task-emoji" id="record-task-emoji">⚡</div>
            <div class="record-task-name" id="record-task-name">修复空间站的能量线路</div>
            <div class="record-task-earth" id="record-task-earth">🌍 地球对应：电工</div>
        </div>

        <div class="record-question">
            💬 这个任务为什么吸引力你？
        </div>

        <div class="record-question">
            💬 在你过去的经历中，有没有做过和这个任务相关的事情？你觉得自己擅长吗？
        </div>

        <textarea class="record-textarea" id="record-textarea" placeholder="例如：我之前在学校参加过木工社团，做过一些小木盒，我觉得自己做手工活还挺擅长的..."></textarea>

        <div class="voice-input-controls">
            <button class="voice-input-btn" id="record-voice-btn" onclick="toggleVoiceInput()">
                🎤 开始语音输入
            </button>
        </div>
        <div class="voice-status" id="voice-status"></div>
        <div class="voice-error" id="voice-error"></div>

        <div class="record-modal-buttons">
            <button class="record-save-btn" onclick="saveRecord()">💾 保存</button>
            <button class="record-skip-btn" onclick="skipRecord()">⏭️ 跳过</button>
        </div>
    </div>
</div>

<!-- 音频文件 -->
<audio id="audio-main" src="music/职业体验1.m4a"></audio>
<audio id="audio-realistic" src="music/职业体验2.m4a"></audio>
<audio id="audio-investigative" src="music/职业体验3.m4a"></audio>
<audio id="audio-artistic" src="music/职业体验4.m4a"></audio>
<audio id="audio-social" src="music/职业体验5.m4a"></audio>
<audio id="audio-enterprising" src="music/职业体验6.m4a"></audio>
<audio id="audio-conventional" src="music/职业体验7.m4a"></audio>
<audio id="audio-result" src="music/职业体验8.m4a"></audio>

<div id="portal-game-status"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/game-portal.js"></script>

<script>
    // --- 整合的数据集（采用网页1的霍兰德六角模型，映射到星球与任务） ---
    const PLANETS = [
        {
            id: 'realistic', name: '机械工坊星', icon: '🔧', color: '#ff9f4a',
            desc: '动手操作、工具、机械——用双手解决问题',
            tasks: [
                { task: '修复空间站的能量线路', emoji: '⚡', earth: '电工' },
                { task: '组装一台勘探机器人', emoji: '🔧', earth: '机械师' },
                { task: '为太空温室搭建木质支架', emoji: '🪚', earth: '木工' },
                { task: '焊接飞船外壳的裂缝', emoji: '🔥', earth: '焊工' },
                { task: '在太空农场种植外星土豆', emoji: '🌽', earth: '农夫' },

    // 播放音频函数
    function playAudio(pageId) {
        const audioId = `audio-${pageId}`;
        const audio = document.getElementById(audioId);
        const soundBtn = document.getElementById('main-sound-btn');

        if (!audio) {
            console.error('音频元素不存在:', audioId);
            return;
        }

        // 如果点击的是正在播放的音频，则暂停
        if (currentAudio === audio && !audio.paused) {
            audio.pause();
            if (soundBtn) {
                soundBtn.classList.remove('playing');
                soundBtn.classList.add('paused');
            }
            currentAudio = null;
            return;
        }

        // 如果点击的是暂停的音频，则继续播放
        if (currentAudio === audio && audio.paused) {
            audio.play();
            if (soundBtn) {
                soundBtn.classList.remove('paused');
                soundBtn.classList.add('playing');
            }
            return;
        }

        // 停止当前正在播放的音频
        stopAllAudio();

        // 播放新音频
        audio.play().then(() => {
            currentAudio = audio;
            if (soundBtn) {
                soundBtn.classList.remove('paused');
                soundBtn.classList.add('playing');
            }
        }).catch(error => {
            console.error('播放失败:', error);
        });

        // 音频播放完毕后的回调
        audio.onended = function () {
            if (soundBtn) {
                soundBtn.classList.remove('playing', 'paused');
            }
            currentAudio = null;
        };
    }

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    stream.getTracks().forEach(track => track.stop());
                    startRecordRecognition();
                })
                .catch(err => {
                    errorEl.textContent = '无法访问麦克风，请检查权限设置';
                });
        } else {
            startRecordRecognition();
        }
    }

    // 开始语音识别
    function startRecordRecognition() {
        const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
        const voiceBtn = document.getElementById('record-voice-btn');
        const statusEl = document.getElementById('voice-status');
        const errorEl = document.getElementById('voice-error');
        const textarea = document.getElementById('record-textarea');

        errorEl.textContent = '';

        recordRecognition = new SpeechRecognitionAPI();
        recordRecognition.lang = (window.I18N ? window.I18N.getSpeechLang() : 'zh-CN');
        recordRecognition.interimResults = true;
        recordRecognition.continuous = true;
        recordRecognition.maxAlternatives = 1;

        // 记录语音识别开始前 textarea 的长度和内容
        let recognitionStartIndex = textarea.value.length;
        let baseText = textarea.value;

        recordRecognition.onstart = function() {
            isRecordRecognizing = true;
            voiceBtn.textContent = '⏹️ 结束语音输入';
            voiceBtn.classList.add('recording');
            statusEl.textContent = '正在初始化麦克风...';
        };

        // 实际开始捕获音频时触发（比 onstart 更晚，但更准确）
        recordRecognition.onaudiostart = function() {
            statusEl.textContent = '🎤 正在听...请说话';
            // 添加一个短暂的视觉反馈，提示用户现在可以说话了
            statusEl.style.color = '#00e0ff';
        };

        recordRecognition.onaudioend = function() {
            statusEl.style.color = '';
        };

        recordRecognition.onresult = function(event) {
            let interimTranscript = '';

            // 遍历所有结果，区分最终结果和临时结果
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    // 最终结果：追加到基础文本
                    const separator = baseText && !baseText.endsWith(' ') ? ' ' : '';
                    baseText = baseText + separator + transcript;
                    textarea.value = baseText;
                    // 更新起始位置
                    recognitionStartIndex = baseText.length;
                } else {
                    // 临时结果：累积显示
                    interimTranscript += transcript;
                }
            }

            // 如果有临时结果，显示在最终文本后面（不保存到 baseText）
            if (interimTranscript) {
                const separator = baseText && !baseText.endsWith(' ') ? ' ' : '';
                textarea.value = baseText + separator + interimTranscript;
            }
        };

        recordRecognition.onerror = function(event) {
            isRecordRecognizing = false;
            voiceBtn.textContent = '🎤 开始语音输入';
            voiceBtn.classList.remove('recording');
            statusEl.textContent = '';

            if (event.error === 'not-allowed') {
                errorEl.textContent = '麦克风权限被拒绝';
            } else if (event.error === 'no-speech') {
                errorEl.textContent = '没有检测到语音，请重试';
            } else {
                errorEl.textContent = '语音识别出错：' + event.error;
            }
        };

        recordRecognition.onend = function() {
            isRecordRecognizing = false;
            voiceBtn.textContent = '🎤 开始语音输入';
            voiceBtn.classList.remove('recording');
            statusEl.textContent = '';
            recordRecognition = null;
        };

        try {
            recordRecognition.start();
        } catch (error) {
            errorEl.textContent = '语音识别启动失败';
        }
    }

        if (selectedTasks.size === 0) {
            topThreeDiv.innerHTML = '<div class="top-badge" style="border-color:#555; color:#888;">🌌 处于观察期</div>';
            adviceDiv.innerHTML = '你这次没有点亮任何特定的星际任务。也许你还在观察，或者想创造一个全新的职业领域？没关系，星辰大海有无限可能，随时欢迎回来探索！';
        } else {
            topThreeDiv.innerHTML = top3.map(t =>
                `<div class="top-badge" style="border-color:${t.color}">${t.label} <span>(${t.score})</span></div>`
            ).join('');

            const labels = top3.map(t => t.label.split(' ')[1]).join('、'); // 提取"现实型"等字眼

            // 构建录音记录显示
            let recordsHtml = '';
            const recordEntries = Object.entries(taskRecords);
            if (recordEntries.length > 0) {
                recordsHtml = `
                    <div style="margin-top: 25px; text-align: left;">
                        <h3 style="color: var(--accent-gold); margin-bottom: 15px;">📝 你的职业想法</h3>
                        ${recordEntries.map(([taskId, record]) => `
                            <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 3px solid var(--accent-blue);">
                                <div style="font-weight: bold; color: var(--text-main); margin-bottom: 8px;">
                                    ${record.task.emoji} ${record.task.task} <span style="color: var(--text-dim); font-size: 0.85em;">(${record.task.earth})</span>
                                </div>
                                <div style="color: var(--text-dim); line-height: 1.6;">
                                    ${record.text || '<i style="color: #556;">没有留下想法</i>'}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            adviceDiv.innerHTML = `<p style="margin-bottom:10px;">🌟 <strong>分析结论：</strong> 你展现出了对 <strong>${labels}</strong> 领域的浓厚兴趣！</p>
            <p>在地球上，你可能也会非常喜欢这些领域对应的工作内容（比如刚才卡片下方的地球职业）。了解自己的兴趣雷达，是开启理想人生的第一步！</p>
            ${recordsHtml}`;
        }
        
        document.getElementById('result-modal').style.display = 'flex';

        // 播放结果音频
        stopAllAudio();
        setTimeout(() => {
            const resultAudio = document.getElementById('audio-result');
            if (resultAudio) {
                resultAudio.play().catch(error => {
                    console.error('结果音频播放失败:', error);
                });
            }
        }, 300);

        // 自动保存到云端 + 计划下一个游戏
        if (!hasAutoUploadedRecord) {
            saveResultToCloud();
        }
        if (window.GamePortal && !hasScheduledNextGame) {
            hasScheduledNextGame = true;
            window.GamePortal.scheduleNextGame('career-experience', { statusTarget: '#cloud-save-status', delayMs: 5000 });
        }
    }

    // ============== Portal 云端记录集成 ==============
    let hasAutoUploadedRecord = false;
    let hasScheduledNextGame = false;

    function goToNextGame() {
        if (window.GamePortal) {
            window.GamePortal.goToNextGame('career-experience');
        }
    }

    function buildCareerExperienceRecord() {
        const now = new Date();
        const dims = [
            { id: 'realistic', label: '现实型 (R)', score: dimensionScores.realistic },
            { id: 'investigative', label: '研究型 (I)', score: dimensionScores.investigative },
            { id: 'artistic', label: '艺术型 (A)', score: dimensionScores.artistic },
            { id: 'social', label: '社会型 (S)', score: dimensionScores.social },
            { id: 'enterprising', label: '企业型 (E)', score: dimensionScores.enterprising },
            { id: 'conventional', label: '常规型 (C)', score: dimensionScores.conventional }
        ];
        const sorted = [...dims].sort((a, b) => b.score - a.score);
        const top3 = sorted.slice(0, 3).filter((d) => d.score > 0);
        const topLabels = top3.length ? top3.map((t) => t.label).join('、') : '尚未点亮';

        const taskRecordList = Object.entries(taskRecords).map(([taskId, record]) => ({
            taskId,
            taskName: record.task && record.task.task ? record.task.task : '',
            earthCareer: record.task && record.task.earth ? record.task.earth : '',
            emoji: record.task && record.task.emoji ? record.task.emoji : '',
            reflectionText: record.text || '',
            answeredAt: record.timestamp || ''
        }));

        const lines = [
            '# 职业体验馆记录',
            '',
            `- 生成时间: ${now.toLocaleString('zh-CN')}`,
            `- 点亮的兴趣维度排行: ${topLabels}`,
            `- 点亮的任务数: ${selectedTasks ? selectedTasks.size : 0}`,
            ''
        ];
        dims.forEach((d) => lines.push(`- ${d.label} 分数: ${d.score}`));
        if (taskRecordList.length) {
            lines.push('', '## 用户反思（语音/文字）');
            taskRecordList.forEach((r, i) => {
                lines.push(`${i + 1}. ${r.emoji} ${r.taskName}（${r.earthCareer}）：${r.reflectionText || '（未填写）'}`);
            });
        }

        return {
            summary: `兴趣排行：${topLabels}`,
            markdown: lines.join('\n'),
            detailJson: {
                generatedAt: now.toISOString(),
                dimensionScores: { ...dimensionScores },
                rankedDimensions: sorted,
                topThree: top3,
                selectedTaskIds: Array.from(selectedTasks || []),
                taskRecords: taskRecordList
            }
        };
    }

    async function saveResultToCloud() {
        const statusEl = document.getElementById('cloud-save-status');
        if (!window.GamePortal) {
            if (statusEl) statusEl.textContent = '公共云端模块未加载成功';
            return;
        }
        if (statusEl) statusEl.textContent = '正在保存到云端...';
        try {
            const record = buildCareerExperienceRecord();
            const result = await window.GamePortal.saveRecord({
                gameKey: 'career-experience',
                gameTitle: '星际探索者·兴趣宇宙大冒险',
                recordType: 'assessment',
                resultType: '兴趣探索结果',
                summary: record.summary,
                recordMarkdown: record.markdown,
                detailJson: record.detailJson
            });
            if (statusEl) statusEl.textContent = result.message;
            if (result && result.savedToCloud) {
                hasAutoUploadedRecord = true;
            } else {
                alert('记录未保存到云端：' + ((result && result.message) || '请先登录'));
            }
        } catch (error) {
            if (statusEl) statusEl.textContent = `保存失败：${error.message || '请稍后重试'}`;
            alert('保存失败：' + (error && error.message ? error.message : error));
        }
    }

    if (window.GamePortal) {
        window.GamePortal.renderGameStatus('#portal-game-status', { homeHref: '../home.html' });
    }
</script>

</body>
</html>
