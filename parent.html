<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩悟星际成长测评系统 · 家长资料</title>
    <!-- 本页固定中文，不加载 i18n -->
    <script>
        try { localStorage.setItem('app-lang', 'zh'); } catch (e) {}
    </script>
    <style>
        :root {
            --brand-blue: #1a4ea0;
            --brand-blue-2: #2e6cc9;
            --brand-yellow: #ffd700;
            --bg: #f5f8ff;
            --card: #ffffff;
            --text: #1f2c4a;
            --muted: #5b6b85;
            --line: #e2e9f5;
            --error: #c53030;
            --success: #1f7a4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background:
                radial-gradient(ellipse at 12% 8%, rgba(26,78,160,0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 88% 92%, rgba(255,215,0,0.08) 0%, transparent 45%),
                var(--bg);
            color: var(--text); padding: 0 22px 100px;
            font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            line-height: 1.7;
            min-height: 100vh;
        }
        .top-bar {
            position: sticky; top: 0; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; margin-bottom: 22px;
            background: rgba(245,248,255,0.88); backdrop-filter: blur(8px);
        }
        .brand {
            display: flex; align-items: center; gap: 10px;
        }
        .brand-logo {
            width: 36px; height: 36px; border-radius: 9px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-blue-2));
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 800;
            box-shadow: 0 4px 14px rgba(20,40,120,0.25);
        }
        .brand-name {
            font-size: 1.05rem; font-weight: 700; color: var(--brand-blue);
            letter-spacing: 0.5px;
        }
        .brand-sub { font-size: 0.78rem; color: var(--muted); margin-top: 1px; letter-spacing: 1px; }
        .btn-back {
            font-size: 0.9rem; color: var(--muted); text-decoration: none;
            border: 1px solid var(--line); padding: 7px 14px; border-radius: 999px;
            background: white; transition: 0.15s;
        }
        .btn-back:hover { color: var(--brand-blue); border-color: var(--brand-blue-2); }

        .container { max-width: 760px; margin: 0 auto; }

        .hero {
            margin-bottom: 22px; padding: 24px 28px; border-radius: 18px;
            background: linear-gradient(135deg, rgba(26,78,160,0.06), rgba(255,215,0,0.05));
            border: 1px solid rgba(26,78,160,0.18);
        }
        .hero h1 {
            margin: 0 0 8px;
            color: var(--brand-blue);
            font-size: clamp(1.4rem, 3vw, 1.7rem);
            font-weight: 800;
            display: flex; align-items: center; gap: 10px;
        }
        .hero p { margin: 0; color: var(--text); line-height: 1.7; font-size: 0.96rem; }
        .hero .who { color: var(--muted); font-size: 0.86rem; margin-top: 8px; }
        .hero .who strong { color: var(--brand-blue); }

        .login-required {
            display: none;
            padding: 20px 24px; border-radius: 16px;
            background: #fff8e1; border: 1px solid #ffe8a3;
            color: #7a5b00; margin-bottom: 22px;
        }
        .login-required.show { display: block; }
        .login-required strong { color: #5a4500; }
        .login-required .actions { margin-top: 12px; display: flex; gap: 10px; }
        .login-required .btn {
            padding: 10px 20px; border-radius: 999px; border: none; cursor: pointer;
            font-weight: 700; font-family: inherit; font-size: 0.92rem;
        }
        .login-required .btn-go {
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-blue-2));
            color: white;
        }

        .card {
            padding: 26px 28px; border-radius: 18px;
            border: 1px solid var(--line);
            background: var(--card);
            box-shadow: 0 4px 18px rgba(20,40,80,0.05);
        }
        .field { margin-bottom: 18px; }
        label {
            display: block; color: var(--text); font-size: 0.95rem;
            font-weight: 600; margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%; padding: 11px 14px; font-size: 1rem;
            background: #fafbff;
            border: 1px solid var(--line);
            color: var(--text); border-radius: 10px;
            font-family: inherit; transition: 0.15s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--brand-blue-2);
            box-shadow: 0 0 0 3px rgba(46,108,201,0.12);
            background: #fff;
        }
        textarea { resize: vertical; min-height: 70px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 600px) { .grid-3 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }

        .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 22px; }
        .btn-primary, .btn-secondary {
            padding: 12px 26px; font-size: 1rem; font-weight: 700;
            border-radius: 999px; cursor: pointer; border: none;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-blue-2));
            color: white; box-shadow: 0 6px 16px rgba(20,40,120,0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(20,40,120,0.33);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary {
            background: white; color: var(--brand-blue);
            border: 1px solid var(--line);
        }
        .btn-secondary:hover { background: rgba(26,78,160,0.06); border-color: var(--brand-blue-2); }

        .status {
            margin-top: 16px; padding: 0 4px;
            color: var(--success); font-weight: 600; min-height: 1.4em;
            font-size: 0.95rem;
        }
        .status.error { color: var(--error); }

        .loading-hint {
            color: var(--muted); margin-bottom: 16px;
            background: rgba(46,108,201,0.06);
            border-left: 3px solid var(--brand-blue-2);
            padding: 10px 14px; border-radius: 8px;
            font-size: 0.92rem;
        }
        .loading-hint:empty { display: none; }

        .login-chip {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(46,108,201,0.08); color: var(--brand-blue);
            padding: 4px 12px; border-radius: 999px; font-size: 0.85rem;
            font-weight: 600; margin-left: 4px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">
            <div class="brand-logo">玩</div>
            <div>
                <div class="brand-name">玩悟星际成长测评系统</div>
                <div class="brand-sub">家长资料 · PARENT PROFILE</div>
            </div>
        </div>
        <a class="btn-back" href="introduction.html">⬅ 测评介绍</a>
    </div>

    <main class="container">

        <!-- 未登录提示（内嵌登录/注册表单，不跳转） -->
        <section id="login-required" class="login-required">
            <strong>⚠️ 还未登录</strong>
            <p style="margin-top:6px;">家长资料需要登录后才能保存到云端档案。直接在这里登录或注册即可。</p>
            <div class="inline-auth-tabs" style="display:flex; gap:6px; margin-top:14px;">
                <button class="inline-tab active" data-mode="signin" type="button"
                    style="flex:1; padding:8px 14px; border-radius:999px 999px 8px 8px; border:1px solid var(--line); background:#fff; cursor:pointer; font-weight:600; font-family:inherit;">登录</button>
                <button class="inline-tab" data-mode="signup" type="button"
                    style="flex:1; padding:8px 14px; border-radius:999px 999px 8px 8px; border:1px solid var(--line); background:#fff; cursor:pointer; font-weight:600; font-family:inherit;">注册新账号</button>
            </div>
            <form id="inline-auth-form" autocomplete="on" style="margin-top:12px;">
                <div class="field">
                    <label for="inline-username">账号</label>
                    <input id="inline-username" name="username" type="text" autocomplete="username"
                           placeholder="3-20 位英文 / 数字 / 下划线" />
                </div>
                <div class="field">
                    <label for="inline-password">密码</label>
                    <input id="inline-password" name="password" type="password" autocomplete="current-password"
                           placeholder="至少 6 位" />
                </div>
                <div class="actions">
                    <button id="inline-submit" type="submit" class="btn-primary">登录</button>
                </div>
                <div id="inline-auth-status" class="status"></div>
            </form>
        </section>

        <!-- 资料介绍 -->
        <section class="hero" id="hero-section" style="display:none;">
            <h1>👨‍👩‍👧 家长资料</h1>
            <p>请填写孩子的基本情况，让测评更懂你的孩子。每个账号只填一次，保存后可随时回来更新。</p>
            <div class="who">当前账号：<strong id="current-username">—</strong> <span class="login-chip">已登录</span></div>
        </section>

        <!-- 表单 -->
        <section class="card" id="form-section" style="display:none;">
            <p id="loading-hint" class="loading-hint">正在加载已有资料...</p>

            <div class="field">
                <label for="hobbies">孩子的爱好</label>
                <textarea id="hobbies" rows="2" placeholder="例如：画画、踢足球、看科幻小说..."></textarea>
            </div>

            <div class="grid-2">
                <div class="field">
                    <label for="grades">孩子的成绩 (可选)</label>
                    <select id="grades">
                        <option value="">请选择</option>
                        <option value="excellent">优秀</option>
                        <option value="good">良好</option>
                        <option value="average">中等</option>
                        <option value="need-effort">需要努力</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="field">
                    <label for="grade-level">孩子的年级</label>
                    <input id="grade-level" type="text" placeholder="例如：五年级">
                </div>
            </div>

            <div class="grid-2">
                <div class="field">
                    <label for="school-name">学校名称</label>
                    <input id="school-name" type="text" placeholder="孩子目前就读的学校">
                </div>
                <div class="field">
                    <label for="school-type">学校类型</label>
                    <select id="school-type">
                        <option value="">请选择</option>
                        <option value="public">公立</option>
                        <option value="private">私立</option>
                        <option value="international">国际学校</option>
                        <option value="other">其他</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label>用 3 个词形容你的孩子</label>
                <div class="grid-3">
                    <input id="word1" type="text" placeholder="词 1">
                    <input id="word2" type="text" placeholder="词 2">
                    <input id="word3" type="text" placeholder="词 3">
                </div>
            </div>

            <div class="field">
                <label for="strong">孩子擅长的事</label>
                <textarea id="strong" rows="2" placeholder="例如：动手做实验、和同学合作、解决数学难题..."></textarea>
            </div>

            <div class="field">
                <label for="weak">孩子不擅长的事</label>
                <textarea id="weak" rows="2" placeholder="例如：长时间写作、当众发言、独立完成作业..."></textarea>
            </div>

            <div class="field">
                <label for="dynamics">家里孩子和家长的互动 / 谁做主比较多</label>
                <select id="dynamics">
                    <option value="">请选择</option>
                    <option value="child">孩子做主比较多</option>
                    <option value="parent">家长做主比较多</option>
                    <option value="equal">比较平等</option>
                    <option value="varies">看具体情况</option>
                </select>
            </div>

            <div class="actions">
                <button id="save-btn" class="btn-primary">💾 保存并进入测评 ➡</button>
                <button class="btn-secondary" onclick="location.href='intro.html'">⬅ 跳过，直接进入太空</button>
            </div>
            <div id="status" class="status"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sxtqkgtbalcwzewqfovp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4dHFrZ3RiYWxjd3pld3Fmb3ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDQzNzAsImV4cCI6MjA5MDQyMDM3MH0.hS67yc5El6RaVb4nHb607H8SWge30GOS_grXVSQbXO4';
        const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const statusEl = document.getElementById('status');
        const loadingEl = document.getElementById('loading-hint');
        const heroSection = document.getElementById('hero-section');
        const formSection = document.getElementById('form-section');
        const loginRequired = document.getElementById('login-required');
        const currentUsernameEl = document.getElementById('current-username');
        const saveBtn = document.getElementById('save-btn');

        function setStatus(msg, isErr) {
            statusEl.textContent = msg || '';
            statusEl.classList.toggle('error', !!isErr);
        }

        function readForm() {
            return {
                hobbies: document.getElementById('hobbies').value.trim(),
                grades: document.getElementById('grades').value,
                grade_level: document.getElementById('grade-level').value.trim(),
                school_name: document.getElementById('school-name').value.trim(),
                school_type: document.getElementById('school-type').value,
                three_words: [
                    document.getElementById('word1').value.trim(),
                    document.getElementById('word2').value.trim(),
                    document.getElementById('word3').value.trim()
                ],
                strong: document.getElementById('strong').value.trim(),
                weak: document.getElementById('weak').value.trim(),
                dynamics: document.getElementById('dynamics').value
            };
        }

        function fillForm(d) {
            if (!d) return;
            document.getElementById('hobbies').value = d.hobbies || '';
            document.getElementById('grades').value = d.grades || '';
            document.getElementById('grade-level').value = d.grade_level || '';
            document.getElementById('school-name').value = d.school_name || '';
            document.getElementById('school-type').value = d.school_type || '';
            const w = d.three_words || [];
            document.getElementById('word1').value = w[0] || '';
            document.getElementById('word2').value = w[1] || '';
            document.getElementById('word3').value = w[2] || '';
            document.getElementById('strong').value = d.strong || '';
            document.getElementById('weak').value = d.weak || '';
            document.getElementById('dynamics').value = d.dynamics || '';
        }

        function showLoggedOut() {
            loginRequired.classList.add('show');
            heroSection.style.display = 'none';
            formSection.style.display = 'none';
        }

        function showLoggedIn(user) {
            loginRequired.classList.remove('show');
            heroSection.style.display = '';
            formSection.style.display = '';
            const username = (user.user_metadata && user.user_metadata.username) ||
                             (user.email || '').replace(/@.*$/, '') || '已登录用户';
            currentUsernameEl.textContent = username;
        }

        const LOCAL_PARENT_KEY = 'parent_profile_local';

        function loadFromLocal() {
            try {
                const raw = localStorage.getItem(LOCAL_PARENT_KEY);
                if (!raw) return null;
                return JSON.parse(raw);
            } catch (e) { return null; }
        }
        function saveToLocal(payload) {
            try { localStorage.setItem(LOCAL_PARENT_KEY, JSON.stringify(payload)); } catch (e) {}
        }

        function isMissingTableError(err) {
            const msg = (err && err.message) || '';
            return /schema cache|parent_profiles.*not.*found|relation .*parent_profiles.*does not exist/i.test(msg);
        }

        async function loadExisting() {
            try {
                const { data: sessionData } = await supa.auth.getSession();
                const user = sessionData && sessionData.session ? sessionData.session.user : null;
                if (!user) {
                    showLoggedOut();
                    return;
                }
                showLoggedIn(user);
                loadingEl.textContent = '正在加载已有资料...';
                try {
                    const { data, error } = await supa
                        .from('parent_profiles')
                        .select('*')
                        .eq('user_id', user.id)
                        .maybeSingle();
                    if (error) throw error;
                    if (data) {
                        fillForm(data);
                        loadingEl.textContent = '你已经填过家长资料了，可以更新内容后再次保存。';
                        return;
                    }
                } catch (cloudErr) {
                    if (isMissingTableError(cloudErr)) {
                        // 后端表不存在 → 静默回落到 localStorage
                        const local = loadFromLocal();
                        if (local) fillForm(local);
                        loadingEl.innerHTML = '⚠️ 云端表 <code>parent_profiles</code> 还没建好；目前本地暂存。' +
                            '<br>请在 Supabase SQL Editor 运行下方提示中的 SQL（见控制台日志）。';
                        console.warn('[parent.html] parent_profiles 表不存在，已回落到本地存储');
                        console.warn('[parent.html] 请在 Supabase 跑：CREATE TABLE public.parent_profiles ...');
                        return;
                    }
                    throw cloudErr;
                }
                // 云端无数据，但表存在；尝试从本地恢复
                const local = loadFromLocal();
                if (local) fillForm(local);
                loadingEl.textContent = '';
            } catch (e) {
                loadingEl.textContent = '';
                setStatus('加载失败：' + (e.message || ''), true);
            }
        }

        saveBtn.addEventListener('click', async () => {
            saveBtn.disabled = true;
            const original = saveBtn.textContent;
            saveBtn.textContent = '保存中...';
            setStatus('');
            try {
                const { data: sessionData } = await supa.auth.getSession();
                const user = sessionData && sessionData.session ? sessionData.session.user : null;
                if (!user) {
                    setStatus('保存失败：请先登录账号', true);
                    showLoggedOut();
                    return;
                }
                const payload = Object.assign(
                    { user_id: user.id, updated_at: new Date().toISOString() },
                    readForm()
                );
                // 总是先写本地（兜底）
                saveToLocal(payload);
                try {
                    const { error } = await supa.from('parent_profiles').upsert(payload, { onConflict: 'user_id' });
                    if (error) throw error;
                    setStatus('✅ 已保存到云端。正在进入测评首页...');
                } catch (cloudErr) {
                    if (isMissingTableError(cloudErr)) {
                        // 表不存在，但已经存到本地了，直接放行
                        setStatus('⚠️ 云端表未建（已暂存本地），仍可继续测评 ➡');
                        console.warn('[parent.html] 保存到云端失败（表不存在），已写入 localStorage：', payload);
                    } else {
                        throw cloudErr;
                    }
                }
                setTimeout(() => location.href = 'intro.html', 1100);
            } catch (e) {
                setStatus('保存失败，请重试：' + (e.message || ''), true);
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = original;
            }
        });

        // ====== 内嵌登录/注册表单 ======
        const inlineForm = document.getElementById('inline-auth-form');
        const inlineUsername = document.getElementById('inline-username');
        const inlinePassword = document.getElementById('inline-password');
        const inlineSubmit = document.getElementById('inline-submit');
        const inlineStatus = document.getElementById('inline-auth-status');
        const inlineTabs = document.querySelectorAll('.inline-tab');
        const USERNAME_RE = /^[a-z0-9_-]{3,20}$/;
        let inlineMode = 'signin';

        inlineTabs.forEach(t => {
            t.addEventListener('click', () => {
                inlineMode = t.dataset.mode;
                inlineTabs.forEach(x => x.classList.toggle('active', x === t));
                inlineTabs.forEach(x => {
                    const isActive = x.classList.contains('active');
                    x.style.background = isActive ? 'linear-gradient(135deg, #1a4ea0, #2e6cc9)' : '#fff';
                    x.style.color = isActive ? '#fff' : '';
                });
                inlineSubmit.textContent = inlineMode === 'signin' ? '登录' : '注册并登录';
                inlinePassword.autocomplete = inlineMode === 'signin' ? 'current-password' : 'new-password';
            });
        });
        // 默认激活样式
        inlineTabs[0].style.background = 'linear-gradient(135deg, #1a4ea0, #2e6cc9)';
        inlineTabs[0].style.color = '#fff';

        function buildLoginEmail(u) { return `${u.trim().toLowerCase()}@wanwu-local.auth`; }

        inlineForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = inlineUsername.value.trim().toLowerCase();
            const password = inlinePassword.value;
            inlineStatus.textContent = '';
            inlineStatus.classList.remove('error');
            if (!USERNAME_RE.test(username)) {
                inlineStatus.classList.add('error');
                inlineStatus.textContent = '账号格式：3-20 位小写英文 / 数字 / 下划线 / 短横线';
                return;
            }
            if (!password || password.length < 6) {
                inlineStatus.classList.add('error');
                inlineStatus.textContent = '密码至少 6 位';
                return;
            }
            inlineSubmit.disabled = true;
            const orig = inlineSubmit.textContent;
            inlineSubmit.textContent = inlineMode === 'signin' ? '正在登录...' : '正在注册...';
            try {
                const email = buildLoginEmail(username);
                if (inlineMode === 'signin') {
                    const { error } = await supa.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                } else {
                    const { data, error } = await supa.auth.signUp({
                        email, password, options: { data: { username } }
                    });
                    if (error) throw error;
                    if (!data.session) {
                        const { error: e2 } = await supa.auth.signInWithPassword({ email, password });
                        if (e2) throw e2;
                    }
                }
                inlineStatus.textContent = '✅ 登录成功，正在加载...';
                await loadExisting();
            } catch (err) {
                inlineStatus.classList.add('error');
                inlineStatus.textContent = (inlineMode === 'signin' ? '登录失败：' : '注册失败：') + (err.message || '请检查账号密码');
            } finally {
                inlineSubmit.disabled = false;
                inlineSubmit.textContent = orig;
            }
        });

        // 监听 auth 状态变化（处理 session 异步恢复的情况）
        supa.auth.onAuthStateChange((_event, session) => {
            if (session && session.user) {
                showLoggedIn(session.user);
            }
        });

        loadExisting();
    </script>
</body>
</html>
